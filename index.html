<!--
[중요] 진짜 가족 공유를 쓰려면 Firebase 설정값을 아래 FIREBASE_CONFIG에 넣으세요.
1) Firebase 콘솔 > 프로젝트 생성
2) Firestore Database 생성
3) 웹 앱 추가 후 firebaseConfig 복사
4) 아래 const FIREBASE_CONFIG = { ... } 부분 교체
5) GitHub Pages에 index.html로 업로드
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAetOk4YV9OTl7fjQOJAVcapWXmFHETLeQ",
    authDomain: "family-calendar-d8fe4.firebaseapp.com",
    projectId: "family-calendar-d8fe4",
    storageBucket: "family-calendar-d8fe4.firebasestorage.app",
    messagingSenderId: "1032921993484",
    appId: "1:1032921993484:web:eab16c0de22853126e3929"
  };

  const hasFirebaseConfig = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes("여기에");

  window.__firebaseReady = false;
  window.__firebaseAPI = null;

  if (hasFirebaseConfig) {
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getFirestore(app);
      window.__firebaseReady = true;
      window.__firebaseAPI = { db, doc, getDoc, setDoc, onSnapshot, serverTimestamp };
    } catch (e) {
      console.warn("Firebase 초기화 실패. 로컬 저장으로 동작합니다.", e);
    }
  }
</script>

/* SPLASH */
.splash{
  position:fixed;
  inset:0;
  z-index:9999;
  background:linear-gradient(180deg,#FFFDF8 0%,#F5F5F7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
.splash.hide{opacity:0;visibility:hidden}
.splash-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  transform:translateY(-10px);
  animation:splashPop .65s ease both;
}
.splash-icon{
  width:92px;
  height:92px;
  border-radius:24px;
  box-shadow:0 14px 32px rgba(0,0,0,.14);
  object-fit:cover;
  background:#fff;
}
.splash-title{font-size:24px;font-weight:900;color:var(--blue);letter-spacing:-.5px}
.splash-sub{font-size:13px;font-weight:700;color:var(--t3)}
.splash-loader{
  margin-top:4px;
  width:36px;
  height:4px;
  border-radius:99px;
  background:linear-gradient(90deg,var(--blue),var(--purple),var(--orange));
  animation:splashLoad 1s ease-in-out infinite alternate;
}
@keyframes splashPop{
  from{opacity:0;transform:translateY(8px) scale(.96)}
  to{opacity:1;transform:translateY(-10px) scale(1)}
}
@keyframes splashLoad{
  from{transform:scaleX(.45);opacity:.45}
  to{transform:scaleX(1);opacity:1}
}

    {id:2,name:'둘째',grade:'초등',year:'',cls:'',num:'',cats:[
      {label:'하교 시간',items:[]},{label:'학원',items:[]},{label:'기타',items:[]}
    ]}
  ],
  shiftData:{}
};

const TODAY=new Date();
const TY=TODAY.getFullYear(),TM=TODAY.getMonth(),TD=TODAY.getDate();
let main='s',subF='all',doneF='all',donePer='1m';
let calY=TY,calM=TM,selDate=null;
let _mType='family';
const DAYS=['일','월','화','수','목','금','토'];
const SHIFTS=['D','E','N','OFF'];
const SCLS={D:'s-d',E:'s-e',N:'s-n',OFF:'s-off'};
const STXT={D:'주간',E:'저녁',N:'야간',OFF:'휴무'};

let notes=[],family=[],requests=[],shiftData={};
let roomId = getRoomId();
let unsubscribe=null;
let remoteReady=false;
let savingRemote=false;
let hydrated=false;

function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtD(s){if(!s)return'';const p=s.split('-');return`${+p[1]}/${+p[2]}`}
function daysFmt(arr){if(!arr||!arr.length)return'매일';return arr.map(i=>DAYS[i]).join('·')}
function typeName(t){return t==='work'?'회사':t==='family'?'가족':'개인'}
function typeChip(t){return t==='work'?'chip-w':t==='family'?'chip-f':'chip-p'}
function dotCls(t){return t==='work'?'dw':t==='family'?'df':'dp'}
function isDone(x){return x.done===true || x.done==='true' || x.done===1 || x.done==='1'}

function makeId(){
  return Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
}
function getRoomId(){
  const url=new URL(location.href);
  let r=url.searchParams.get('room')||localStorage.getItem(SK.room);
  if(!r){
    r='family-'+makeId();
    localStorage.setItem(SK.room,r);
  }
  // 주소에 room이 없으면 자동으로 붙여서, 주소창 링크가 곧 가족 공유 링크가 되게 함
  if(!url.searchParams.get('room')){
    url.searchParams.set('room', r);
    history.replaceState(null, '', url.toString());
  }
  return r;
}
function normalizeData(d){
  const base=deepCopy(DEFAULT_DATA);
  d=d||base;
  notes=Array.isArray(d.notes)?d.notes:base.notes;
  requests=Array.isArray(d.requests)?d.requests:(base.requests||[]);
  family=Array.isArray(d.family)?d.family:base.family;
  shiftData=d.shiftData||{};
  if(Object.keys(shiftData).length===0){
    const p=['D','E','N','OFF','D','D','E','N','OFF','OFF'];let i=0;
    for(let y=TY;y<=TY+1;y++){for(let m=0;m<12;m++){const dn=new Date(y,m+1,0).getDate();for(let dd=1;dd<=dn;dd++){shiftData[dk(y,m,dd)]=p[i%p.length];i++;}}}
  }
}
function currentData(){return {notes,family,requests,shiftData,updatedAt:Date.now()}}
function saveLocal(){localStorage.setItem(SK.data,JSON.stringify(currentData()))}
function loadLocal(){try{return JSON.parse(localStorage.getItem(SK.data)||'null')}catch(e){return null}}
function saveAll(){
  saveLocal();
  if(remoteReady && window.__firebaseAPI && hydrated){
    savingRemote=true;
    const api=window.__firebaseAPI;
    api.setDoc(api.doc(api.db,'familyCalendars',roomId), {...currentData(), updatedAt:api.serverTimestamp()}, {merge:true})
      .catch(e=>{console.warn(e);updateSyncPill('Firebase 저장 실패: 로컬에만 저장됨');})
      .finally(()=>{savingRemote=false;});
  }
}

async function initData(){
  normalizeData(loadLocal()||DEFAULT_DATA);
  render();
  await waitFirebase();
  if(window.__firebaseReady && window.__firebaseAPI){
    remoteReady=true;
    updateSyncPill('실시간 공유 연결 중...');
    const api=window.__firebaseAPI;
    const ref=api.doc(api.db,'familyCalendars',roomId);
    const snap=await api.getDoc(ref);
    if(!snap.exists()){
      await api.setDoc(ref,{...currentData(),createdAt:api.serverTimestamp(),updatedAt:api.serverTimestamp()});
    }
    unsubscribe=api.onSnapshot(ref,(s)=>{
      if(!s.exists()||savingRemote)return;
      normalizeData(s.data());
      saveLocal();
      hydrated=true;
      render();
      updateSyncPill('실시간 공유 연결됨');
    },(e)=>{
      console.warn(e);
      updateSyncPill('공유 연결 실패: Firebase 설정/권한 확인 필요');
    });
  }else{
    hydrated=true;
    updateSyncPill('현재 로컬 저장 모드 · Firebase 설정 전에는 가족 간 실시간 공유가 안 됩니다');
  }
}
function waitFirebase(){
  return new Promise(resolve=>setTimeout(resolve,500));
}

function updateSyncPill(txt){
  const el=document.getElementById('sync-status');
  if(el)el.textContent=txt;
}

function doneAfter(){
  const n=new Date();
  if(donePer==='all')return new Date(0);
  const d=new Date(n);
  if(donePer==='1w')d.setDate(d.getDate()-7);
  else if(donePer==='2w')d.setDate(d.getDate()-14);
  else if(donePer==='1m')d.setMonth(d.getMonth()-1);
  return d;
}
function notesOnDate(y,m,d){
  const k=dk(y,m,d);
  // 완료된 일정은 달력 점/일정 목록에서 완전히 제외
  return notes.filter(n=>!isDone(n) && n.start && n.start<=k && (!n.end || n.end>=k));
}

function toggleNote(id){const n=notes.find(x=>String(x.id)===String(id));if(n){n.done=!n.done;saveAll();render()}}
function delNote(id){notes=notes.filter(x=>String(x.id)!==String(id));saveAll();render()}

function makeCard(n){
  const ds=n.start?(fmtD(n.start)+(n.end?` ~ ${fmtD(n.end)}`:'')):'';
  const done=isDone(n);
  const ts=(n.sT||n.eT)?`${n.sT||''}${n.sT&&n.eT?' ~ ':''}${n.eT||''}`:'';
  return`<div class="card">
    <div class="c-row">
      <div class="chk${done?' on':''}" onclick="toggleNote('${n.id}')">
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M1 5.5L4.5 9.5L12 1" stroke="#cc0000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="c-body">
        <div class="c-title${done?' done':''}">${escapeHtml(n.title)}</div>
        <div class="c-meta">
          <span class="chip ${typeChip(n.type)}">${typeName(n.type)}</span>
          ${ds?`<span class="chip chip-g">${ds}</span>`:''}
          ${ts?`<span class="chip chip-g">${ts}</span>`:''}
        </div>
        ${done&&n.comment?`<button class="comment-pill" onclick="openEditNote('${n.id}')">"${escapeHtml(n.comment)}"</button>`:''}
        ${done&&!n.comment?`<button class="comment-pill" onclick="openEditNote('${n.id}')">+ 코멘트 달기</button>`:''}
      </div>
      <div class="c-right">
        <button class="small-link" onclick="openEditNote('${n.id}')">수정</button>
        <button class="small-link" onclick="delNote('${n.id}')">삭제</button>
      </div>
    </div>
  </div>`;
}

function renderS(){
  let active=notes.filter(n=>!isDone(n)&&(subF==='all'||n.type===subF));
  let doneFilt=notes.filter(n=>{
    if(!isDone(n))return false;
    if(doneF!=='all'&&n.type!==doneF)return false;
    if(!n.start)return true;
    return new Date(n.start)>=doneAfter();
  });
  return`
    <div class="filter-row">
      <button class="chip-btn cb-all${subF==='all'?' on':''}" onclick="setSub('all')">전체</button>
      <button class="chip-btn cb-f${subF==='family'?' on':''}" onclick="setSub('family')">가족</button>
      <button class="chip-btn cb-p${subF==='personal'?' on':''}" onclick="setSub('personal')">개인</button>
      <button class="chip-btn cb-w${subF==='work'?' on':''}" onclick="setSub('work')">회사</button>
    </div>
    <div class="sec">진행 중 <span class="sec-cnt">${active.length}</span></div>
    <div class="card-wrap">${active.length?active.map(makeCard).join(''):'<div class="empty">진행 중인 일정이 없어요</div>'}</div>
    <div class="div"></div>
    <div class="sec">완료</div>
    <div class="filter-row">
      <button class="chip-btn cb-all${doneF==='all'?' on':''}" onclick="setDoneF('all')">전체</button>
      <button class="chip-btn cb-f${doneF==='family'?' on':''}" onclick="setDoneF('family')">가족</button>
      <button class="chip-btn cb-p${doneF==='personal'?' on':''}" onclick="setDoneF('personal')">개인</button>
      <button class="chip-btn cb-w${doneF==='work'?' on':''}" onclick="setDoneF('work')">회사</button>
    </div>
    <div class="period-row">
      <span class="period-lbl">기간</span>
      <button class="period-chip${donePer==='1w'?' on':''}" onclick="setPer('1w')">1주</button>
      <button class="period-chip${donePer==='2w'?' on':''}" onclick="setPer('2w')">2주</button>
      <button class="period-chip${donePer==='1m'?' on':''}" onclick="setPer('1m')">1개월</button>
      <button class="period-chip${donePer==='all'?' on':''}" onclick="setPer('all')">전체</button>
    </div>
    <div class="card-wrap" style="margin-top:10px">${doneFilt.length?doneFilt.map(makeCard).join(''):'<div class="empty">완료된 일정이 없어요</div>'}</div>
  `;
}
function setSub(t){subF=t;render()}
function setDoneF(t){doneF=t;render()}
function setPer(t){donePer=t;render()}

function renderC(){
  const y=calY,m=calM;
  const dInM=new Date(y,m+1,0).getDate();
  const firstDay=new Date(y,m,1).getDay();
  let g='';
  DAYS.forEach(d=>{g+=`<div class="cal-dname">${d}</div>`});
  for(let i=0;i<firstDay;i++)g+=`<div></div>`;
  for(let d=1;d<=dInM;d++){
    const key=dk(y,m,d);
    const isToday=y===TY&&m===TM&&d===TD;
    const isSel=selDate===key;
    const evs=notesOnDate(y,m,d);
    const cur=shiftData[key]||'OFF';
    const dots=evs.slice(0,5).map(n=>`<div class="cal-dot ${dotCls(n.type)}"></div>`).join('');
    g+=`<div class="cal-cell${isSel?' sel':''}" onclick="selCal('${key}')">
      <div class="cal-num${isToday?' today-n':''}">${d}</div>
      <div><span class="shift-one ${SCLS[cur]}">${cur}</span></div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }

  let evHtml='';
  if(selDate){
    const sp=selDate.split('-');
    const cur=shiftData[selDate]||'OFF';
    const evs=notesOnDate(+sp[0],+sp[1]-1,+sp[2]);
    evHtml=`<div class="ev-card">
      <div class="ev-hd">${+sp[1]}/${+sp[2]} 일정</div>
      <div class="shift-picker">
        <span class="shift-picker-title">근무</span>
        ${SHIFTS.map(s=>`<button class="shift-btn ${SCLS[s]}${cur===s?' on':''}" onclick="setShift('${selDate}','${s}')">${s}</button>`).join('')}
      </div>
      ${evs.length?evs.map(n=>{
        const ts=(n.sT||n.eT)?`${n.sT||''}${n.sT&&n.eT?' ~ ':''}${n.eT||''}`:'시간 미정';
        return`<div class="ev-item"><div class="ev-dot ${dotCls(n.type)}"></div><div><div class="ev-title">${escapeHtml(n.title)}</div><div class="ev-sub">${ts} · ${typeName(n.type)}</div></div></div>`;
      }).join(''):`<div style="font-size:12px;color:var(--t3);padding:4px 0">등록된 일정 없음</div>`}
      <button class="primary-btn" style="margin-top:12px" onclick="openAddModal('${selDate}')">이 날짜에 일정 추가</button>
    </div>`;
  }

  return`<div class="cal-outer">
    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="chCal(-1)">‹</button>
        <div class="cal-nav-title">${y}년 ${m+1}월</div>
        <button class="cal-nav-btn" onclick="chCal(1)">›</button>
      </div>
      <div class="cal-grid">${g}</div>
      <div class="cal-legend">
        <div class="leg"><span class="leg-chip s-d">D</span></div>
        <div class="leg"><span class="leg-chip s-e">E</span></div>
        <div class="leg"><span class="leg-chip s-n">N</span></div>
        <div class="leg"><span class="leg-chip s-off">OFF</span></div>
        <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>가족</div>
        <div class="leg"><span class="leg-dot" style="background:var(--pink)"></span>개인</div>
        <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>회사</div>
      </div>
    </div>
    ${evHtml}
  </div>`;
}
function setShift(k,t){shiftData[k]=t;saveAll();render()}
function selCal(k){selDate=selDate===k?null:k;const sp=k.split('-');calY=+sp[0];calM=+sp[1]-1;render()}
function chCal(d){calM+=d;if(calM<0){calM=11;calY--}if(calM>11){calM=0;calY++}selDate=null;render()}

function renderI(){
  let h=`<div class="fi-outer">`;
  family.forEach((kid,ki)=>{
    const gs=[kid.grade,kid.year?`${kid.year}학년`:'',kid.cls?`${kid.cls}반`:'',kid.num?`${kid.num}번`:'' ].filter(Boolean).join(' ');
    h+=`<div class="fi-card">
      <div class="fi-hd"><div class="fi-name">${escapeHtml(kid.name)}</div>
        <div class="fi-hd-btns">
          <button class="fi-btn fi-btn-e" onclick="editKid(${ki})">수정</button>
          <button class="fi-btn fi-btn-d" onclick="delKid(${ki})">삭제</button>
        </div>
      </div>
      <div class="fi-row"><span class="fi-key">학년·반·번호</span><span style="font-size:12px;font-weight:700">${escapeHtml(gs||'미입력')}</span></div>`;
    kid.cats.forEach((cat,ci)=>{
      const isEtc=cat.label==='기타';
      h+=`<div class="cat-hd"><span class="cat-lbl">${escapeHtml(cat.label)}</span>
        <div class="cat-hd-r">
          <button class="cat-add" onclick="addRow(${ki},${ci})">+ 추가</button>
          <button class="cat-del" onclick="delCat(${ki},${ci})">삭제</button>
        </div></div>`;
      cat.items.forEach((item,ii)=>{
        h+=`<div class="fi-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
            <span class="fi-key">${isEtc?'내용':daysFmt(item.days)}</span>
            <button class="row-del" onclick="delRow(${ki},${ci},${ii})">✕</button>
          </div>
          ${!isEtc?`<div class="day-sel">${DAYS.map((d,di)=>`<button class="day-btn${item.days&&item.days.includes(di)?' on':''}" onclick="toggleDay(${ki},${ci},${ii},${di})">${d}</button>`).join('')}</div>`:''}
          <input class="fi-input" style="text-align:left;max-width:100%" value="${escapeAttr(item.val)}" onchange="updVal(${ki},${ci},${ii},this.value)" onclick="this.select()"/>
        </div>`;
      });
      if(!cat.items.length)h+=`<div style="font-size:11px;color:var(--t3);padding:6px 0">항목 없음</div>`;
    });
    h+=`</div>`;
  });
  const shareUrl = `${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
  h+=`<button style="width:100%;padding:14px;border-radius:var(--r);border:2px dashed var(--border);background:transparent;color:var(--t3);font-size:13px;font-weight:900;cursor:pointer;font-family:inherit" onclick="addKid()">+ 아이 추가</button>
    <div class="share-banner" style="margin:12px 0 0">
      <div><div class="share-txt">📎 가족 공유 링크</div><div class="share-sub">${shareUrl}</div></div>
      <button class="share-btn" onclick="copyShareLink()">복사</button>
    </div>
    <div class="sync-pill" id="sync-status" style="margin:8px 0 0">${window.__firebaseReady?'실시간 공유 연결 중...':'현재 로컬 저장 모드 · Firebase 설정 필요'}</div>
  </div>`;
  return h;
}
function toggleDay(ki,ci,ii,di){const a=family[ki].cats[ci].items[ii].days;const idx=a.indexOf(di);if(idx>=0)a.splice(idx,1);else a.push(di);a.sort((x,y)=>x-y);saveAll();render()}
function updVal(ki,ci,ii,v){family[ki].cats[ci].items[ii].val=v;saveAll()}
function addRow(ki,ci){const isEtc=family[ki].cats[ci].label==='기타';family[ki].cats[ci].items.push({days:isEtc?[]:[], val:''});saveAll();render();setTimeout(()=>{const ins=document.querySelectorAll('.fi-input');if(ins.length)ins[ins.length-1].focus()},50)}
function delRow(ki,ci,ii){family[ki].cats[ci].items.splice(ii,1);saveAll();render()}
function delCat(ki,ci){family[ki].cats.splice(ci,1);saveAll();render()}
function delKid(i){family.splice(i,1);saveAll();render()}


function toggleReq(id){const r=requests.find(x=>String(x.id)===String(id));if(r){r.done=!r.done;saveAll();render()}}
function delReq(id){requests=requests.filter(x=>String(x.id)!==String(id));saveAll();render()}

function makeReqCard(r){
  return`<div class="card">
    <div class="c-row">
      <div class="chk${isDone(r)?' on':''}" onclick="toggleReq('${r.id}')">
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M1 5.5L4.5 9.5L12 1" stroke="#cc0000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="c-body">
        <div class="c-title${isDone(r)?' done':''}">${escapeHtml(r.title)}</div>
        <div class="c-meta">
          ${r.writer?`<span class="chip chip-f">${escapeHtml(r.writer)}</span>`:''}
          <span class="chip chip-g">조르기</span>
        </div>
        ${r.comment?`<button class="comment-pill" onclick="openEditReq('${r.id}')">"${escapeHtml(r.comment)}"</button>`:''}
      </div>
      <div class="c-right">
        <button class="small-link" onclick="openEditReq('${r.id}')">수정</button>
        <button class="small-link" onclick="delReq('${r.id}')">삭제</button>
      </div>
    </div>
  </div>`;
}

function renderR(){
  const active=requests.filter(r=>!isDone(r));
  const done=requests.filter(r=>isDone(r));
  return`
    <div class="sec">진행 중 <span class="sec-cnt">${active.length}</span></div>
    <div class="card-wrap">${active.length?active.map(makeReqCard).join(''):'<div class="empty">부탁할 일이 없어요</div>'}</div>
    <div class="div"></div>
    <div class="sec">완료 <span class="sec-cnt">${done.length}</span></div>
    <div class="card-wrap">${done.length?done.map(makeReqCard).join(''):'<div class="empty">완료된 부탁이 없어요</div>'}</div>
  `;
}

function openReqModal(id){
  const r=id?requests.find(x=>String(x.id)===String(id)):null;
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">${r?'조르기 수정':'조르기 추가'}</div>
      <div class="ml">부탁할 일</div>
      <input class="mi" id="rq-ti" placeholder="예: 준비물 챙겨줘, 학원 데려다줘" value="${r?escapeAttr(r.title):''}"/>
      <div class="ml">작성자</div>
      <input class="mi" id="rq-wr" placeholder="예: 첫째, 둘째, 엄마" value="${r?escapeAttr(r.writer||''):''}"/>
      <div class="ml">메모</div>
      <textarea class="ta" id="rq-cm" placeholder="필요한 내용을 적어주세요">${r?escapeHtml(r.comment||''):''}</textarea>
      <button class="primary-btn" onclick="saveReq('${r?r.id:''}')">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function openEditReq(id){openReqModal(id)}
function saveReq(id){
  const title=(document.getElementById('rq-ti')||{}).value||'';
  if(!title.trim())return;
  const writer=(document.getElementById('rq-wr')||{}).value||'';
  const comment=(document.getElementById('rq-cm')||{}).value||'';
  if(id){
    const r=requests.find(x=>String(x.id)===String(id)); if(!r)return;
    r.title=title.trim(); r.writer=writer.trim(); r.comment=comment;
  }else{
    requests.push({id:Date.now(),title:title.trim(),writer:writer.trim(),done:false,comment});
  }
  saveAll();closeM();render();
}

function setMain(t){
  main=t;
  ['s','c','i','r'].forEach(k=>{
    const el=document.getElementById('tab-'+k);
    const cls=k==='s'?'tab-s':k==='c'?'tab-c':k==='i'?'tab-i':'tab-r';
    el.className=`tab ${cls}${k===t?' on':''}`;
  });
  const tr=document.getElementById('top-right');
  if(t==='s'){tr.innerHTML=`<button class="toss-btn" onclick="openExport()">내보내기</button><button class="toss-btn primary" onclick="openAddModal()">+ 추가</button>`;}
  else if(t==='i'){tr.innerHTML=`<button class="toss-btn purple" onclick="addKid()">+ 아이 추가</button>`;}
  else if(t==='r'){tr.innerHTML=`<button class="toss-btn primary" onclick="openReqModal()">+ 추가</button>`;}
  else{tr.innerHTML='';}
  render();
}

function render(){
  let h='';
  if(main==='s')h=renderS();
  else if(main==='c')h=renderC();
  else if(main==='i')h=renderI();
  else if(main==='r')h=renderR();
  document.getElementById('body').innerHTML=h;
}

function copyShareLink(){
  const url=`${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert('가족 공유 링크가 복사됐어요.'));}
  else{alert('주소창의 URL을 복사해서 가족에게 보내주세요:\n'+url);}
}

function openAddModal(dateVal){
  _mType='family';
  const today=dateVal || new Date().toISOString().slice(0,10);
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">새 일정 추가</div>
      <div class="ml">제목</div>
      <input class="mi" id="m-ti" placeholder="가족 일정, 학교 행사, 병원, 학원 등"/>
      <div class="ml">구분</div>
      <div class="type-sel">
        <button class="type-btn tf" id="btn-f" onclick="selT('family')">가족</button>
        <button class="type-btn" id="btn-p" onclick="selT('personal')">개인</button>
        <button class="type-btn" id="btn-w" onclick="selT('work')">회사</button>
      </div>
      <div class="ml">날짜</div>
      <div class="mi-2">
        <div><div class="sublabel">시작일</div><input class="mi" type="date" id="m-sd" value="${today}"/></div>
        <div><div class="sublabel">종료일</div><input class="mi" type="date" id="m-ed"/></div>
      </div>
      <div class="ml">시간</div>
      <div class="mi-2">
        <div><div class="sublabel">시작</div><input class="mi" type="time" id="m-st"/></div>
        <div><div class="sublabel">종료</div><input class="mi" type="time" id="m-et"/></div>
      </div>
      <button class="primary-btn" onclick="saveNote()">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function selT(t){
  _mType=t;
  document.getElementById('btn-p').className='type-btn'+(t==='personal'?' tp':'');
  document.getElementById('btn-w').className='type-btn'+(t==='work'?' tw':'');
  document.getElementById('btn-f').className='type-btn'+(t==='family'?' tf':'');
}
function saveNote(){
  const ti=(document.getElementById('m-ti')||{}).value||'';
  if(!ti.trim())return;
  notes.push({id:Date.now(),title:ti.trim(),type:_mType,start:document.getElementById('m-sd').value,end:document.getElementById('m-ed').value,sT:document.getElementById('m-st').value,eT:document.getElementById('m-et').value,done:false,comment:''});
  saveAll();closeM();render();
}

function openEditNote(id){
  const n=notes.find(x=>String(x.id)===String(id));if(!n)return;
  _mType=n.type||'family';
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">일정 수정</div>
      <div class="ml">제목</div><input class="mi" id="e-ti" value="${escapeAttr(n.title)}"/>
      <div class="ml">구분</div>
      <div class="type-sel">
        <button class="type-btn${_mType==='family'?' tf':''}" id="btn-f" onclick="selT('family')">가족</button>
        <button class="type-btn${_mType==='personal'?' tp':''}" id="btn-p" onclick="selT('personal')">개인</button>
        <button class="type-btn${_mType==='work'?' tw':''}" id="btn-w" onclick="selT('work')">회사</button>
      </div>
      <div class="ml">날짜</div>
      <div class="mi-2">
        <div><div class="sublabel">시작일</div><input class="mi" type="date" id="e-sd" value="${n.start||''}"/></div>
        <div><div class="sublabel">종료일</div><input class="mi" type="date" id="e-ed" value="${n.end||''}"/></div>
      </div>
      <div class="ml">시간</div>
      <div class="mi-2">
        <div><div class="sublabel">시작</div><input class="mi" type="time" id="e-st" value="${n.sT||''}"/></div>
        <div><div class="sublabel">종료</div><input class="mi" type="time" id="e-et" value="${n.eT||''}"/></div>
      </div>
      <div class="ml">코멘트</div>
      <textarea class="ta" id="e-cm" placeholder="메모나 후기를 남겨보세요">${escapeHtml(n.comment||'')}</textarea>
      <button class="primary-btn" onclick="saveEditNote('${id}')">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function saveEditNote(id){
  const n=notes.find(x=>String(x.id)===String(id));if(!n)return;
  n.title=document.getElementById('e-ti').value;
  n.type=_mType;
  n.start=document.getElementById('e-sd').value;
  n.end=document.getElementById('e-ed').value;
  n.sT=document.getElementById('e-st').value;
  n.eT=document.getElementById('e-et').value;
  n.comment=document.getElementById('e-cm').value;
  saveAll();closeM();render();
}

function editKid(i){
  const k=family[i];
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">아이 정보 수정</div>
      <div class="ml">이름</div><input class="mi" id="k-n" value="${escapeAttr(k.name)}"/>
      <div class="ml">학교 과정</div><input class="mi" id="k-g" value="${escapeAttr(k.grade)}" placeholder="초등, 유치원 등"/>
      <div class="ml">학년 · 반 · 번호</div>
      <div class="mi-3">
        <input class="mi" id="k-y" value="${escapeAttr(k.year)}" placeholder="학년"/>
        <input class="mi" id="k-c" value="${escapeAttr(k.cls)}" placeholder="반"/>
        <input class="mi" id="k-u" value="${escapeAttr(k.num)}" placeholder="번호"/>
      </div>
      <button class="primary-btn" onclick="saveKid(${i})">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function addKid(){family.push({id:Date.now(),name:'새 아이',grade:'',year:'',cls:'',num:'',cats:[{label:'하교 시간',items:[]},{label:'학원',items:[]},{label:'기타',items:[]}]});saveAll();editKid(family.length-1)}
function saveKid(i){family[i]={...family[i],name:document.getElementById('k-n').value,grade:document.getElementById('k-g').value,year:document.getElementById('k-y').value,cls:document.getElementById('k-c').value,num:document.getElementById('k-u').value};saveAll();closeM();render()}
function closeM(e){if(!e||e.target.classList.contains('modal-bg'))document.getElementById('modal').innerHTML=''}
function openExport(){
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

  const scheduleRows=notes.map(n=>({
    상태:isDone(n)?'완료':'진행중',
    구분:typeName(n.type),
    제목:n.title||'',
    시작일:n.start||'',
    종료일:n.end||'',
    시작시간:n.sT||'',
    종료시간:n.eT||'',
    코멘트:n.comment||''
  }));

  const requestRows=requests.map(r=>({
    상태:isDone(r)?'완료':'진행중',
    작성자:r.writer||'',
    부탁할일:r.title||'',
    메모:r.comment||''
  }));

  const familyRows=[];
  family.forEach(kid=>{
    (kid.cats||[]).forEach(cat=>{
      (cat.items||[]).forEach(item=>{
        familyRows.push({
          이름:kid.name||'',
          학교과정:kid.grade||'',
          학년:kid.year||'',
          반:kid.cls||'',
          번호:kid.num||'',
          구분:cat.label||'',
          요일:daysFmt(item.days),
          내용:item.val||''
        });
      });
    });
  });

  const shiftRows=Object.keys(shiftData).sort().map(k=>({
    날짜:k,
    근무:shiftData[k]||''
  }));

  // SheetJS가 로드되면 진짜 .xlsx 생성
  if(window.XLSX){
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(scheduleRows),'일정');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(requestRows),'조르기');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(familyRows),'아이정보');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(shiftRows),'근무표');
    XLSX.writeFile(wb,`가족캘린더_${stamp}.xlsx`);
    return;
  }

  // 인터넷 문제로 라이브러리가 안 불러와졌을 때 CSV로 대체
  const rows=[['상태','구분','제목','시작일','종료일','시작시간','종료시간','코멘트'],
    ...scheduleRows.map(r=>[r.상태,r.구분,r.제목,r.시작일,r.종료일,r.시작시간,r.종료시간,r.코멘트])];
  const csv='\ufeff'+rows.map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`가족캘린더_${stamp}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}


function hideSplash(){
  const s=document.getElementById('splash');
  if(s){
    setTimeout(()=>s.classList.add('hide'),700);
    setTimeout(()=>s.remove(),1300);
  }
}

initData();
window.addEventListener('load', hideSplash);
</script>
</body>
</html>
