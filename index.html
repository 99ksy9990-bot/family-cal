<!--
[중요] 진짜 가족 공유를 쓰려면 Firebase 설정값을 아래 FIREBASE_CONFIG에 넣으세요.
1) Firebase 콘솔 > 프로젝트 생성
2) Firestore Database 생성
3) 웹 앱 추가 후 firebaseConfig 복사
4) 아래 const FIREBASE_CONFIG = { ... } 부분 교체
5) GitHub Pages에 index.html로 업로드
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, FieldPath, onSnapshot, serverTimestamp, collection, getDocs, writeBatch, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAetOk4YV9OTl7fjQOJAVcapWXmFHETLeQ",
    authDomain: "family-calendar-d8fe4.firebaseapp.com",
    projectId: "family-calendar-d8fe4",
    storageBucket: "family-calendar-d8fe4.firebasestorage.app",
    messagingSenderId: "1032921993484",
    appId: "1:1032921993484:web:eab16c0de22853126e3929"
  };

  const hasFirebaseConfig = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes("여기에");

  window.__firebaseReady = false;
  window.__firebaseAPI = null;

  if (hasFirebaseConfig) {
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getFirestore(app);
      window.__firebaseReady = true;
      window.__firebaseAPI = { db, doc, getDoc, setDoc, updateDoc, FieldPath, onSnapshot, serverTimestamp, collection, getDocs, writeBatch, deleteDoc };
    } catch (e) {
      console.warn("Firebase 초기화 실패. 로컬 저장으로 동작합니다.", e);
    }
  }
</script>

    const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    if(link) link.href = dark ? 'https://99ksy9990-bot.github.io/family-cal/icon-dark.png' : 'https://99ksy9990-bot.github.io/family-cal/icon.png';
  }
  setIcon();
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', setIcon);
  }
})();
</script>
