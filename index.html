<!--
[중요] 진짜 가족 공유를 쓰려면 Firebase 설정값을 아래 FIREBASE_CONFIG에 넣으세요.
1) Firebase 콘솔 > 프로젝트 생성
2) Firestore Database 생성
3) 웹 앱 추가 후 firebaseConfig 복사
4) 아래 const FIREBASE_CONFIG = { ... } 부분 교체
5) GitHub Pages에 index.html로 업로드
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAetOk4YV9OTl7fjQOJAVcapWXmFHETLeQ",
    authDomain: "family-calendar-d8fe4.firebaseapp.com",
    projectId: "family-calendar-d8fe4",
    storageBucket: "family-calendar-d8fe4.firebasestorage.app",
    messagingSenderId: "1032921993484",
    appId: "1:1032921993484:web:eab16c0de22853126e3929"
  };

  const hasFirebaseConfig = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes("여기에");

  window.__firebaseReady = false;
  window.__firebaseAPI = null;

  if (hasFirebaseConfig) {
    try {
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getFirestore(app);
      window.__firebaseReady = true;
      window.__firebaseAPI = { db, doc, getDoc, setDoc, onSnapshot, serverTimestamp };
    } catch (e) {
      console.warn("Firebase 초기화 실패. 로컬 저장으로 동작합니다.", e);
    }
  }
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  --bg:#F5F5F7;--card:#fff;--border:#E5E5EA;
  --t1:#1C1C1E;--t2:#6B6B6F;--t3:#AEAEB2;
  --blue:#007AFF;--blue-bg:#EAF3FF;--blue-t:#0055B3;
  --pink:#FF2D55;--pink-bg:#FFF0F3;--pink-t:#C0002C;
  --green:#34C759;--green-bg:#EDFAF2;--green-t:#1A7A36;
  --purple:#7C3AED;--purple-bg:#F2EEFF;--purple-t:#4C1D95;

  --yellow:#FFCC00;--yellow-bg:#FFF8D9;--yellow-t:#7A5A00;
  --r:18px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:15px}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative;overflow:hidden}
.topbar{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;background:var(--bg)}
.app-name{font-size:18px;font-weight:800;color:var(--blue);letter-spacing:-0.5px}
.app-sub{font-size:12px;color:var(--t3);margin-top:2px}
.top-right{display:flex;gap:8px;align-items:center}
.toss-btn{height:36px;padding:0 14px;border-radius:22px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:700;color:var(--t1);cursor:pointer;font-family:inherit;white-space:nowrap}
.toss-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.toss-btn.purple{background:var(--purple);border-color:var(--purple);color:#fff}
.tab-bar{display:flex;gap:8px;padding:14px 20px 0}
.tab{flex:1;padding:12px 0;border-radius:24px;border:none;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center}
.tab-s{background:var(--blue-bg);color:var(--blue-t)}
.tab-s.on{background:var(--blue);color:#fff}
.tab-c{background:var(--green-bg);color:var(--green-t)}
.tab-c.on{background:var(--green);color:#fff}
.tab-i{background:var(--purple-bg);color:var(--purple-t)}
.tab-i.on{background:var(--purple);color:#fff}
.tab-r{background:var(--orange-bg);color:var(--orange-t)}

.share-banner{margin:14px 16px 0;background:var(--orange-bg);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);gap:10px}
.share-txt{font-size:13px;font-weight:800;color:var(--orange-t)}
.share-sub{font-size:11px;color:var(--orange-t);opacity:.75;margin-top:2px;word-break:break-all}
.share-btn{font-size:12px;font-weight:800;padding:8px 14px;border-radius:20px;background:var(--orange);color:#fff;border:none;cursor:pointer;font-family:inherit;flex-shrink:0}
.sync-pill{margin:8px 16px 0;padding:8px 12px;border-radius:12px;font-size:11px;color:var(--t2);background:#fff;border:1px solid var(--border)}

.filter-row{display:flex;gap:8px;padding:14px 20px 0;flex-wrap:wrap}
.chip-btn{display:inline-flex;align-items:center;height:34px;padding:0 15px;border-radius:22px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .12s;gap:4px}
.cb-all{background:var(--card);color:var(--t2)}

.cb-p.on{background:var(--pink);color:#fff}
.cb-w{background:var(--blue-bg);color:var(--blue-t)}

.type-btn.tp{background:var(--pink-bg);color:var(--pink-t);border-color:var(--pink)}

/* SPLASH */
.splash{
  position:fixed;
  inset:0;
  z-index:9999;
  background:linear-gradient(180deg,#FFFDF8 0%,#F5F5F7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
.splash.hide{opacity:0;visibility:hidden}
.splash-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  transform:translateY(-10px);
  animation:splashPop .65s ease both;
}
.splash-icon{
  width:92px;
  height:92px;
  border-radius:24px;
  box-shadow:0 14px 32px rgba(0,0,0,.14);
  object-fit:cover;
  background:#fff;
}
.splash-title{font-size:24px;font-weight:900;color:var(--blue);letter-spacing:-.5px}
.splash-sub{font-size:13px;font-weight:700;color:var(--t3)}
.splash-loader{
  margin-top:4px;
  width:36px;
  height:4px;
  border-radius:99px;
  background:linear-gradient(90deg,var(--blue),var(--purple),var(--orange));
  animation:splashLoad 1s ease-in-out infinite alternate;
}
@keyframes splashPop{
  from{opacity:0;transform:translateY(8px) scale(.96)}
  to{opacity:1;transform:translateY(-10px) scale(1)}
}
@keyframes splashLoad{
  from{transform:scaleX(.45);opacity:.45}
  to{transform:scaleX(1);opacity:1}
}

/* 커스텀 날짜/시간 입력 */
.picker-field{
  width:100%;
  height:48px;
  padding:0 10px;
  border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--bg);
  color:var(--t1);
  font-size:13px;
  font-family:inherit;
  font-weight:800;
  text-align:center;
  outline:none;
  cursor:pointer;
  letter-spacing:-.4px;
}
.picker-field.empty{color:var(--t3);font-weight:700}
.picker-bg{
  position:fixed;
  inset:0;
  z-index:220;
  background:rgba(0,0,0,.35);
  display:flex;
  align-items:flex-end;
}
.picker-sheet{
  width:100%;
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:18px 20px 26px;
  box-shadow:0 -8px 28px rgba(0,0,0,.12);
}
.picker-title{
  font-size:17px;
  font-weight:900;
  margin-bottom:14px;
}
.picker-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
.picker-grid.time{
  grid-template-columns:1fr 1fr;
}
.picker-select{
  width:100%;
  height:46px;
  border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-size:15px;
  font-weight:800;
  text-align:center;
  font-family:inherit;
  padding:0 8px;
}
.picker-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}
.picker-actions button{
  height:46px;
  border-radius:16px;
  border:none;

<script>
const SK={data:'fam_shared_v8_data',room:'fam_shared_v8_room'};
const DEFAULT_DATA={
  notes:[
    {id:1,title:'첫째 태권도',type:'family',start:'2026-05-04',end:'',sT:'17:00',eT:'18:00',done:false,comment:''},
    {id:2,title:'팀 주간 보고서',type:'work',start:'2026-05-05',end:'2026-05-06',sT:'09:00',eT:'18:00',done:false,comment:''},
    {id:3,title:'부모님께 연락',type:'personal',start:'2026-05-08',end:'',sT:'20:00',eT:'',done:false,comment:''}
  ],
  requests:[
    {id:101,title:'엄마한테 준비물 확인 부탁',writer:'첫째',done:false,comment:''}
  ],
  memories:[
    {id:201,name:'도미 생일',birth:'2026-05-12',memo:''}
  ],
  family:[
    {id:1,name:'첫째',grade:'초등',year:'2',cls:'3',num:'15',cats:[
      {label:'하교 시간',items:[{days:[1,2,4],val:'15:30'},{days:[3],val:'13:30'}]},
      {label:'학원',items:[{days:[1,3],val:'태권도 17:00'},{days:[2,4],val:'피아노 16:00'}]},
      {label:'기타',items:[{days:[],val:'비상연락처 010-0000-0000'}]}
    ]},
    {id:2,name:'둘째',grade:'초등',year:'',cls:'',num:'',cats:[
      {label:'하교 시간',items:[]},{label:'학원',items:[]},{label:'기타',items:[]}
    ]}
  ],
  shiftData:{}
};

const TODAY=new Date();
const TY=TODAY.getFullYear(),TM=TODAY.getMonth(),TD=TODAY.getDate();
let main='s',subF='all',doneF='all',donePer='1m',searchQ='',isComposing=false;
let calY=TY,calM=TM,selDate=null;
let _mType='family', _mWho='공통';
const DAYS=['일','월','화','수','목','금','토'];
const SHIFTS=['D','E','N','OFF'];
const SCLS={D:'s-d',E:'s-e',N:'s-n',OFF:'s-off'};

const PERSONS = ['공통','아빠','엄마','초이','도미'];
function personCls(who){
  return who==='아빠'?'person-dad':who==='엄마'?'person-mom':who==='초이'?'person-choi':who==='도미'?'person-domi':'person-common';
}
function repeatName(r){return r==='daily'?'매일':r==='weekly'?'매주':r==='monthly'?'매월':'반복 없음'}

const STXT={D:'주간',E:'저녁',N:'야간',OFF:'휴무'};

let notes=[],family=[],requests=[],memories=[],shiftData={};
let roomId = getRoomId();
let unsubscribe=null;
let remoteReady=false;
let savingRemote=false;
let hydrated=false;

function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtD(s){if(!s)return'';const p=s.split('-');return`${+p[1]}/${+p[2]}`}
function dateTimeRange(n){
  const start=n.start||'';
  const end=n.end||'';
  const sT=n.sT||'';
  const eT=n.eT||'';

  // 시간이 없는 일정은 날짜만 표시
  if(!sT && !eT){
    if(!start)return '';
    if(!end || end===start)return fmtD(start);
    return `${fmtD(start)} ~ ${fmtD(end)}`;
  }

  // 시간이 있는 일정은 시작일 시작시간 ~ 종료일 종료시간
  const st=[fmtD(start),sT].filter(Boolean).join(' ');
  const ed=[fmtD(end||start),eT].filter(Boolean).join(' ');
  if(st&&ed)return `${st} ~ ${ed}`;
  return st||ed||'';
}
function daysFmt(arr){if(!arr||!arr.length)return'매일';return arr.map(i=>DAYS[i]).join('·')}
function typeName(t){return t==='work'?'회사':t==='family'?'가족':'개인'}
function typeChip(t){return t==='work'?'chip-w':t==='family'?'chip-f':'chip-p'}
function dotCls(t){return t==='work'?'dw':t==='family'?'df':'dp'}
function getShiftCount(y,m){
  const counts={D:0,E:0,N:0,OFF:0};
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const s=shiftData[dk(y,m,d)]||'OFF';
    if(counts[s]!==undefined)counts[s]++;
  }
  return counts;
}
function isDone(x){return x.done===true || x.done==='true' || x.done===1 || x.done==='1'}
function birthDateInYear(birth,year){
  if(!birth)return '';
  const [,mm,dd]=birth.split('-').map(Number);
  const last=new Date(year,mm,0).getDate();
  const d=Math.min(dd,last);
  return `${year}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function memoriesOnDate(y,m,d){
  const md=`${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return memories.filter(x=>x.birth&&x.birth.slice(5)===md);
}
function ageNow(birth){
  if(!birth)return '';
  const [by]=birth.split('-').map(Number);
  const thisBirth=birthDateInYear(birth,TY);
  let age=TY-by;
  if(dk(TY,TM,TD)<thisBirth)age--;
  return Math.max(0,age);
}
function nextBirthInfo(birth){
  if(!birth)return {date:'',dday:''};
  let y=TY;
  let b=birthDateInYear(birth,y);
  const today=dk(TY,TM,TD);
  if(b<today){y++;b=birthDateInYear(birth,y);}
  const diff=Math.ceil((new Date(b+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
  return {date:b,dday:diff===0?'D-Day':`D-${diff}`};
}

function makeId(){
  return Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
}
function getRoomId(){
  const url=new URL(location.href);
  let r=url.searchParams.get('room')||localStorage.getItem(SK.room);
  if(!r){
    r='family-'+makeId();
    localStorage.setItem(SK.room,r);
  }
  // 주소에 room이 없으면 자동으로 붙여서, 주소창 링크가 곧 가족 공유 링크가 되게 함
  if(!url.searchParams.get('room')){
    url.searchParams.set('room', r);
    history.replaceState(null, '', url.toString());
  }
  return r;
}




function addDaysStr(dateStr,days){
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function addMonthsStr(dateStr,months){
  const [y,m,d]=dateStr.split('-').map(Number);
  const nd=new Date(y,m-1+months,1);
  const last=new Date(nd.getFullYear(),nd.getMonth()+1,0).getDate();
  nd.setDate(Math.min(d,last));
  return nd.toISOString().slice(0,10);
}
function occursOn(n,key){
  if(!n.start) return false;
  if(n.repeatEnd && key>n.repeatEnd) return false;
  if(!n.repeat){
    if(!n.sT && !n.eT && (!n.end || n.end===n.start)) return n.start===key;
    return n.start<=key && (!n.end || n.end>=key);
  }
  if(key<n.start) return false;
  const start=new Date(n.start+'T00:00:00');
  const cur=new Date(key+'T00:00:00');
  const diff=Math.round((cur-start)/86400000);
  if(n.repeat==='daily') return diff>=0;
  if(n.repeat==='weekly') return diff>=0 && diff%7===0;
  if(n.repeat==='monthly') return n.start.slice(8,10)===key.slice(8,10);
  return false;
}
function nextOccurrence(n,fromKey=dk(TY,TM,TD)){
  if(!n.repeat) return n.start||'';
  for(let i=0;i<370;i++){
    const k=addDaysStr(fromKey,i);
    if(occursOn(n,k)) return k;
  }
  return n.start||'';
}
function notesOnDateAll(y,m,d){
  const k=dk(y,m,d);
  return notes.filter(n=>!isDone(n)&&occursOn(n,k)).map(n=>{
    if(n.repeat) return {...n,start:k,end:k,_repeatInstance:true};
    return n;
  });
}

function normalizeData(d){
  const base=deepCopy(DEFAULT_DATA);
  d=d||base;
  notes=Array.isArray(d.notes)?d.notes:base.notes;
  notes.forEach(n=>{if(!n.who)n.who='공통'; if(!('repeat' in n))n.repeat='';});
  requests=Array.isArray(d.requests)?d.requests:(base.requests||[]);
  memories=Array.isArray(d.memories)?d.memories:(base.memories||[]);
  family=Array.isArray(d.family)?d.family:base.family;
  shiftData=d.shiftData||{};
  // 사용자가 입력해둔 근무 값은 유지하고, 비어 있는 날짜만 랜덤으로 채움
  const randShift=['D','E','N','OFF'];
  for(let y=TY;y<=TY+1;y++){
    for(let m=0;m<12;m++){
      const dn=new Date(y,m+1,0).getDate();
      for(let dd=1;dd<=dn;dd++){
        const k=dk(y,m,dd);
        if(!shiftData[k]) shiftData[k]=randShift[Math.floor(Math.random()*randShift.length)];
      }
    }
  }
}
function currentData(){return {notes,family,requests,memories,shiftData,updatedAt:Date.now()}}
function saveLocal(){localStorage.setItem(SK.data,JSON.stringify(currentData()))}
function loadLocal(){try{return JSON.parse(localStorage.getItem(SK.data)||'null')}catch(e){return null}}
function saveAll(){
  saveLocal();
  if(remoteReady && window.__firebaseAPI && hydrated){
    savingRemote=true;
    const api=window.__firebaseAPI;
    api.setDoc(api.doc(api.db,'familyCalendars',roomId), {...currentData(), updatedAt:api.serverTimestamp()}, {merge:true})
      .catch(e=>{console.warn(e);updateSyncPill('Firebase 저장 실패: 로컬에만 저장됨');})
      .finally(()=>{savingRemote=false;});
  }
}

async function initData(){
  try{
    normalizeData(loadLocal()||DEFAULT_DATA);
    hydrated=true;
    render();

    await Promise.race([
      waitFirebase(),
      new Promise(resolve=>setTimeout(resolve,800))
    ]);

    if(window.__firebaseReady && window.__firebaseAPI){
      remoteReady=true;
      updateSyncPill('실시간 공유 연결 중...');
      const api=window.__firebaseAPI;
      const ref=api.doc(api.db,'familyCalendars',roomId);

      let snap=null;
      try{
        snap=await Promise.race([
          api.getDoc(ref),
          new Promise((_,reject)=>setTimeout(()=>reject(new Error('Firebase 읽기 시간 초과')),3000))
        ]);
      }catch(e){
        console.warn(e);
        updateSyncPill('Firebase 응답 지연 · 로컬 데이터로 먼저 실행 중');
        return;
      }

      if(!snap.exists()){
        await api.setDoc(ref,{...currentData(),createdAt:api.serverTimestamp(),updatedAt:api.serverTimestamp()});
      }else{
        normalizeData(snap.data());
        saveLocal();
        render();
      }

      unsubscribe=api.onSnapshot(ref,(s)=>{
        if(!s.exists()||savingRemote)return;
        normalizeData(s.data());
        saveLocal();
        render();
        updateSyncPill('실시간 공유 연결됨');
      },(e)=>{
        console.warn(e);
        updateSyncPill('공유 연결 실패 · 로컬 저장으로 동작 중');
      });
    }else{
      updateSyncPill('현재 로컬 저장 모드 · Firebase 설정 필요');
    }
  }catch(e){
    console.warn('앱 초기화 오류',e);
    hydrated=true;
    normalizeData(loadLocal()||DEFAULT_DATA);
    render();
    updateSyncPill('초기화 오류 · 로컬 저장으로 동작 중');
  }finally{
    hideSplash();
  }
}
function waitFirebase(){return new Promise(resolve=>setTimeout(resolve,300));}

function updateSyncPill(txt){
  const el=document.getElementById('sync-status');
  if(el)el.textContent=txt;
}

function doneAfter(){
  const n=new Date();
  if(donePer==='all')return new Date(0);
  const d=new Date(n);
  if(donePer==='1w')d.setDate(d.getDate()-7);
  else if(donePer==='2w')d.setDate(d.getDate()-14);
  else if(donePer==='1m')d.setMonth(d.getMonth()-1);
  return d;
}
function notesOnDate(y,m,d){
  const k=dk(y,m,d);
  // 완료된 일정은 달력 점/일정 목록에서 완전히 제외
  return notes.filter(n=>{
    if(isDone(n) || !n.start) return false;

    // 시간이 없는 단일 일정은 시작일 하루만 표시
    if(!n.sT && !n.eT && (!n.end || n.end===n.start)){
      return n.start===k;
    }

    return n.start<=k && (!n.end || n.end>=k);
  });
}

function toggleNote(id){const n=notes.find(x=>String(x.id)===String(id));if(n){n.done=!n.done;saveAll();render()}}
function delNote(id){if(!confirmDelete('이 일정을 삭제할까요?'))return;notes=notes.filter(x=>String(x.id)!==String(id));saveAll();render()}


function highlightText(s){
  const safe=escapeHtml(s||'');
  const q=String(searchQ||'').trim();
  if(!q)return safe;
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(esc,'gi'),m=>`<mark class="hl">${m}</mark>`);
}

function makeCard(n){
  const dts=dateTimeRange(n);
  const done=isDone(n);
  return`<div class="card" draggable="true" ondragstart="dragStart(event,'notes','${n.id}')" ondragover="dragOver(event)" ondrop="dropItem(event,'notes','${n.id}')" ondragend="dragEnd(event)">
    <div class="c-row">
      <div class="chk${done?' on':''}" onclick="toggleNote('${n.id}')">
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M1 5.5L4.5 9.5L12 1" stroke="#cc0000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="c-body">
        <div class="c-title${done?' done':''}">${highlightText(n.title)}</div>
        <div class="c-meta">
          <span class="chip ${typeChip(n.type)}">${typeName(n.type)}</span>
          <span class="person-chip ${personCls(n.who||'공통')}">${escapeHtml(n.who||'공통')}</span>
          ${n.repeat?`<span class="chip repeat-chip">${repeatName(n.repeat)}</span>`:''}
          ${dts?`<span class="chip chip-g">${dts}</span>`:''}
        </div>
        ${done&&n.comment?`<button class="comment-pill" onclick="openEditNote('${n.id}')">"${escapeHtml(n.comment)}"</button>`:''}
        ${done&&!n.comment?`<button class="comment-pill" onclick="openEditNote('${n.id}')">+ 코멘트 달기</button>`:''}
      </div>
      <div class="c-right">
<button class="small-link" onclick="openEditNote('${n.id}')">수정</button>
        <button class="small-link" onclick="delNote('${n.id}')">삭제</button>
      </div>
    </div>
  </div>`;
}

function renderS(){
  let active=notes.filter(n=>!isDone(n)&&(subF==='all'||n.type===subF)&&matchSearchNote(n));
  let doneFilt=notes.filter(n=>{
    if(!isDone(n))return false;
    if(!matchSearchNote(n))return false;
    if(doneF!=='all'&&n.type!==doneF)return false;
    if(!n.start)return true;
    return new Date(n.start)>=doneAfter();
  });
  return`
    <div class="filter-row">
      <button class="chip-btn cb-all${subF==='all'?' on':''}" onclick="setSub('all')">전체</button>
      <button class="chip-btn cb-f${subF==='family'?' on':''}" onclick="setSub('family')">가족</button>
      <button class="chip-btn cb-p${subF==='personal'?' on':''}" onclick="setSub('personal')">개인</button>
      <button class="chip-btn cb-w${subF==='work'?' on':''}" onclick="setSub('work')">회사</button>
    </div>
    <div class="sec">진행 중 <span class="sec-cnt">${active.length}</span></div>
    <div class="card-wrap">${active.length?active.map(makeCard).join(''):'<div class="empty">진행 중인 일정이 없어요</div>'}</div>
    <div class="div"></div>
    <div class="sec" onclick="toggleDone()" style="cursor:pointer">완료 ▼</div>
    <div class="filter-row">
      <button class="chip-btn cb-all${doneF==='all'?' on':''}" onclick="setDoneF('all')">전체</button>
      <button class="chip-btn cb-f${doneF==='family'?' on':''}" onclick="setDoneF('family')">가족</button>
      <button class="chip-btn cb-p${doneF==='personal'?' on':''}" onclick="setDoneF('personal')">개인</button>
      <button class="chip-btn cb-w${doneF==='work'?' on':''}" onclick="setDoneF('work')">회사</button>
    </div>
    <div class="period-row">
      <span class="period-lbl">기간</span>
      <button class="period-chip${donePer==='1w'?' on':''}" onclick="setPer('1w')">1주</button>

      <button class="period-chip${donePer==='1m'?' on':''}" onclick="setPer('1m')">1개월</button>

let dragInfo=null;

function dragStart(e, listName, id){
  dragInfo={listName,id};
  e.currentTarget.classList.add('dragging');
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', id);
  }
}
function dragOver(e){
  e.preventDefault();
  if(e.dataTransfer)e.dataTransfer.dropEffect='move';
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  dragInfo=null;
}
function dropItem(e, listName, targetId){
  e.preventDefault();
  if(!dragInfo || dragInfo.listName!==listName || String(dragInfo.id)===String(targetId)) return;

  const arr = listName==='notes' ? notes : requests;
  const from = arr.findIndex(x=>String(x.id)===String(dragInfo.id));
  const to = arr.findIndex(x=>String(x.id)===String(targetId));
  if(from<0 || to<0) return;

  const [item] = arr.splice(from,1);
  arr.splice(to,0,item);

  saveAll();
  render();
}


function confirmDelete(msg){
  return confirm(msg || '정말 삭제할까요?');
}
function normText(v){return String(v||'').toLowerCase().trim()}
function matchSearchNote(n){
  if(!searchQ)return true;
  const q=normText(searchQ);
  return [n.title,n.comment,n.who,typeName(n.type),n.start,n.end,n.sT,n.eT,repeatName(n.repeat||'')].some(v=>normText(v).includes(q));
}
function matchSearchReq(r){
  if(!searchQ)return true;
  const q=normText(searchQ);
  return [r.title,r.writer,r.comment].some(v=>normText(v).includes(q));
}

      <div class="ml">구분</div>
      <div class="type-sel">
        <button class="type-btn tf" id="btn-f" onclick="selT('family')">가족</button>
        <button class="type-btn" id="btn-p" onclick="selT('personal')">개인</button>
        <button class="type-btn" id="btn-w" onclick="selT('work')">회사</button>
      </div>
      <div class="ml">대상</div>
      <div class="type-sel">
        ${PERSONS.map(p=>`<button class="type-btn${p==='공통'?' tf':''}" id="who-${p}" onclick="selWho('${p}')">${p}</button>`).join('')}
      </div>
      <div class="ml">반복</div>
      <select class="mi" id="m-rp">
        <option value="">반복 없음</option>
        <option value="daily">매일</option>
        <option value="weekly">매주</option>
        <option value="monthly">매월</option>
      </select>
      <div class="ml">반복 종료일</div>
    <input class="picker-field empty" id="m-re" readonly data-val="" value="종료 없음" onclick="openDatePicker('m-re')"/>
    <div class="ml">날짜</div>
      <div class="mi-2">
        <div><div class="sublabel">시작일</div><input class="picker-field" id="m-sd" readonly data-val="${today}" value="${dateLabel(today)}" onclick="openDatePicker('m-sd')"/></div>
        <div><div class="sublabel">종료일</div><input class="picker-field empty" id="m-ed" readonly data-val="" value="종료일 없음" onclick="openDatePicker('m-ed')"/></div>
      </div>
      <div class="ml">시간</div>
      <div class="mi-2">
        <div><div class="sublabel">시작</div><input class="picker-field empty" id="m-st" readonly data-val="" value="시간 없음" onclick="openTimePicker('m-st')"/></div>
        <div><div class="sublabel">종료</div><input class="picker-field empty" id="m-et" readonly data-val="" value="시간 없음" onclick="openTimePicker('m-et')"/></div>
      </div>
      <button class="primary-btn" onclick="saveNote()">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function selT(t){
  _mType=t;
  document.getElementById('btn-p').className='type-btn'+(t==='personal'?' tp':'');
  document.getElementById('btn-w').className='type-btn'+(t==='work'?' tw':'');
  document.getElementById('btn-f').className='type-btn'+(t==='family'?' tf':'');
}

function selWho(w){
  _mWho=w;
  PERSONS.forEach(p=>{
    const el=document.getElementById('who-'+p);
    if(el)el.className='type-btn'+(p===w?' tf':'');
  });
}

function saveNote(){
  const ti=(document.getElementById('m-ti')||{}).value||'';
  if(!ti.trim())return;
  notes.push({id:Date.now(),title:ti.trim(),who:_mWho,type:_mType,repeat:(document.getElementById('m-rp')||{}).value||'',repeatEnd:getPickerVal('m-re'),start:getPickerVal('m-sd'),end:getPickerVal('m-ed'),sT:getPickerVal('m-st'),eT:getPickerVal('m-et'),done:false,comment:''});
  saveAll();closeM();render();
}

function openEditNote(id){
  const n=notes.find(x=>String(x.id)===String(id));if(!n)return;
  _mType=n.type||'family';
  _mWho=n.who||'공통';
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">일정 수정</div>
      <div class="ml">제목</div><input class="mi" id="e-ti" value="${escapeAttr(n.title)}"/>
      <div class="ml">구분</div>
      <div class="type-sel">
        <button class="type-btn${_mType==='family'?' tf':''}" id="btn-f" onclick="selT('family')">가족</button>
        <button class="type-btn${_mType==='personal'?' tp':''}" id="btn-p" onclick="selT('personal')">개인</button>
        <button class="type-btn${_mType==='work'?' tw':''}" id="btn-w" onclick="selT('work')">회사</button>
      </div>
      <div class="ml">대상</div>
      <div class="type-sel">
        ${PERSONS.map(p=>`<button class="type-btn${(n.who||'공통')===p?' tf':''}" id="who-${p}" onclick="selWho('${p}')">${p}</button>`).join('')}
      </div>
      <div class="ml">반복</div>
      <select class="mi" id="e-rp">
        <option value="" ${!n.repeat?'selected':''}>반복 없음</option>
        <option value="daily" ${n.repeat==='daily'?'selected':''}>매일</option>
        <option value="weekly" ${n.repeat==='weekly'?'selected':''}>매주</option>
        <option value="monthly" ${n.repeat==='monthly'?'selected':''}>매월</option>
      </select>
      <div class="ml">반복 종료일</div>
    <input class="picker-field empty" id="m-re" readonly data-val="" value="종료 없음" onclick="openDatePicker('m-re')"/>
    <div class="ml">날짜</div>
      <div class="mi-2">
        <div><div class="sublabel">시작일</div><input class="picker-field${n.start?'':' empty'}" id="e-sd" readonly data-val="${n.start||''}" value="${n.start?dateLabel(n.start):'시작일 없음'}" onclick="openDatePicker('e-sd')"/></div>
        <div><div class="sublabel">종료일</div><input class="picker-field${n.end?'':' empty'}" id="e-ed" readonly data-val="${n.end||''}" value="${n.end?dateLabel(n.end):'종료일 없음'}" onclick="openDatePicker('e-ed')"/></div>
      </div>
      <div class="ml">시간</div>
      <div class="mi-2">
        <div><div class="sublabel">시작</div><input class="picker-field${n.sT?'':' empty'}" id="e-st" readonly data-val="${n.sT||''}" value="${n.sT?timeLabel(n.sT):'시간 없음'}" onclick="openTimePicker('e-st')"/></div>
        <div><div class="sublabel">종료</div><input class="picker-field${n.eT?'':' empty'}" id="e-et" readonly data-val="${n.eT||''}" value="${n.eT?timeLabel(n.eT):'시간 없음'}" onclick="openTimePicker('e-et')"/></div>
      </div>
      <div class="ml">코멘트</div>
      <textarea class="ta" id="e-cm" placeholder="메모나 후기를 남겨보세요">${escapeHtml(n.comment||'')}</textarea>
      <button class="primary-btn" onclick="saveEditNote('${id}')">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function saveEditNote(id){
  const n=notes.find(x=>String(x.id)===String(id));if(!n)return;
  n.title=document.getElementById('e-ti').value;
  n.type=_mType;
  n.who=_mWho;
  n.repeat=(document.getElementById('e-rp')||{}).value||'';
  n.start=getPickerVal('e-sd');
  n.end=getPickerVal('e-ed');
  n.sT=getPickerVal('e-st');
  n.eT=getPickerVal('e-et');
  n.comment=document.getElementById('e-cm').value;
  saveAll();closeM();render();
}

function editKid(i){
  const k=family[i];
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">아이 정보 수정</div>
      <div class="ml">이름</div><input class="mi" id="k-n" value="${escapeAttr(k.name)}"/>
      <div class="ml">학교 과정</div><input class="mi" id="k-g" value="${escapeAttr(k.grade)}" placeholder="초등, 유치원 등"/>
      <div class="ml">학년 · 반 · 번호</div>
      <div class="mi-3">
        <input class="mi" id="k-y" value="${escapeAttr(k.year)}" placeholder="학년"/>
        <input class="mi" id="k-c" value="${escapeAttr(k.cls)}" placeholder="반"/>
        <input class="mi" id="k-u" value="${escapeAttr(k.num)}" placeholder="번호"/>
      </div>
      <button class="primary-btn" onclick="saveKid(${i})">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}
function addKid(){family.push({id:Date.now(),name:'새 아이',grade:'',year:'',cls:'',num:'',cats:[{label:'하교 시간',items:[]},{label:'학원',items:[]},{label:'기타',items:[]}]});saveAll();editKid(family.length-1)}
function saveKid(i){family[i]={...family[i],name:document.getElementById('k-n').value,grade:document.getElementById('k-g').value,year:document.getElementById('k-y').value,cls:document.getElementById('k-c').value,num:document.getElementById('k-u').value};saveAll();closeM();render()}

function getPickerVal(id){
  const el=document.getElementById(id);
  return el ? (el.dataset.val||'') : '';
}
function dateLabel(v){
  if(!v)return '';
  const p=v.split('-');
  return `${+p[0]}. ${+p[1]}. ${+p[2]}.`;
}
function timeLabel(v){
  if(!v)return '';
  const [h,m]=v.split(':').map(Number);
  const ap=h<12?'오전':'오후';
  const hh=h%12===0?12:h%12;
  return `${ap} ${hh}:${String(m).padStart(2,'0')}`;
}
function setPickerField(id,val,label,emptyText){
  const el=document.getElementById(id);
  if(!el)return;
  el.dataset.val=val||'';
  el.value=val?label:emptyText;
  el.classList.toggle('empty',!val);
}
function pickerRoot(){
  let p=document.getElementById('picker');
  if(!p){
    p=document.createElement('div');
    p.id='picker';
    document.body.appendChild(p);
  }
  return p;
}
function closePicker(){
  const p=document.getElementById('picker');
  if(p)p.innerHTML='';
}

function openBirthPicker(id){
  const cur=getPickerVal(id)||'2000-01-01';
  const [cy,cm,cd]=cur.split('-').map(Number);
  const century=cy<2000?19:20;
  const yy=cy%100===0?100:cy%100;
  const opts=(arr,sel,fmt=x=>x)=>arr.map(v=>`<option value="${v}" ${v===sel?'selected':''}>${fmt(v)}</option>`).join('');
  pickerRoot().innerHTML=`
  <div class="picker-bg" onclick="closePicker()">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-title">생년월일 선택</div>
      <div class="picker-grid" style="grid-template-columns:0.8fr 1fr 1fr 1fr">
        <select class="picker-select" id="bp-c">
          <option value="19" ${century===19?'selected':''}>19</option>
          <option value="20" ${century===20?'selected':''}>20</option>
        </select>
        <select class="picker-select" id="bp-y">${opts(Array.from({length:99},(_,i)=>i+1),yy,v=>`${String(v).padStart(2,'0')}년`)}</select>
        <select class="picker-select" id="bp-m">${opts(Array.from({length:12},(_,i)=>i+1),cm,v=>`${v}월`)}</select>
        <select class="picker-select" id="bp-d">${opts(Array.from({length:31},(_,i)=>i+1),cd,v=>`${v}일`)}</select>
      </div>
      <div class="picker-actions">
        <button class="picker-cancel" onclick="setPickerField('${id}','','','생년월일 선택');closePicker()">비우기</button>
        <button class="picker-save" onclick="saveBirthPicker('${id}')">선택</button>
      </div>
    </div>
  </div>`;
}
function saveBirthPicker(id){
  const c=+document.getElementById('bp-c').value;
  const yy=+document.getElementById('bp-y').value;
  const m=+document.getElementById('bp-m').value;
  let d=+document.getElementById('bp-d').value;
  const y=c*100+yy;
  const max=new Date(y,m,0).getDate();
  if(d>max)d=max;
  const val=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  setPickerField(id,val,dateLabel(val),'생년월일 선택');
  closePicker();
}

function openDatePicker(id){
  const cur=getPickerVal(id)||new Date().toISOString().slice(0,10);
  const [cy,cm,cd]=cur.split('-').map(Number);
  const years=[];
  for(let y=TY-1;y<=TY+2;y++)years.push(y);
  const opts=(arr,sel)=>arr.map(v=>`<option value="${v}" ${v===sel?'selected':''}>${v}</option>`).join('');
  pickerRoot().innerHTML=`
  <div class="picker-bg" onclick="closePicker()">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-title">날짜 선택</div>
      <div class="picker-grid">
        <select class="picker-select" id="pk-y">${opts(years,cy)}</select>
        <select class="picker-select" id="pk-m">${opts(Array.from({length:12},(_,i)=>i+1),cm)}</select>
        <select class="picker-select" id="pk-d">${opts(Array.from({length:31},(_,i)=>i+1),cd)}</select>
      </div>
      <div class="picker-actions">
        <button class="picker-cancel" onclick="setPickerField('${id}','','${''}','날짜 없음');closePicker()">비우기</button>
        <button class="picker-save" onclick="saveDatePicker('${id}')">선택</button>
      </div>
    </div>
  </div>`;
}
function saveDatePicker(id){
  const y=+document.getElementById('pk-y').value;
  const m=+document.getElementById('pk-m').value;
  let d=+document.getElementById('pk-d').value;
  const max=new Date(y,m,0).getDate();
  if(d>max)d=max;
  const val=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  setPickerField(id,val,dateLabel(val),'날짜 없음');
  closePicker();
}
function openTimePicker(id){
  const cur=getPickerVal(id)||'09:00';
  const [ch,cm]=cur.split(':').map(Number);
  const hours=Array.from({length:24},(_,i)=>i);
  const mins=Array.from({length:12},(_,i)=>i*5);
  const opts=(arr,sel,fmt=x=>x)=>arr.map(v=>`<option value="${v}" ${v===sel?'selected':''}>${fmt(v)}</option>`).join('');
  pickerRoot().innerHTML=`
  <div class="picker-bg" onclick="closePicker()">
    <div class="picker-sheet" onclick="event.stopPropagation()">
      <div class="picker-title">시간 선택</div>
      <div class="picker-grid time">
        <select class="picker-select" id="pk-h">${opts(hours,ch,h=>`${h<12?'오전':'오후'} ${h%12===0?12:h%12}시`)}</select>
        <select class="picker-select" id="pk-min">${opts(mins,Math.round(cm/5)*5,m=>`${String(m).padStart(2,'0')}분`)}</select>
      </div>
      <div class="picker-actions">
        <button class="picker-cancel" onclick="setPickerField('${id}','','${''}','시간 없음');closePicker()">비우기</button>
        <button class="picker-save" onclick="saveTimePicker('${id}')">선택</button>
      </div>
    </div>
  </div>`;
}
function saveTimePicker(id){
  const h=+document.getElementById('pk-h').value;
  const m=+document.getElementById('pk-min').value;
  const val=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  setPickerField(id,val,timeLabel(val),'시간 없음');
  closePicker();
}

function closeM(e){if(!e||e.target.classList.contains('modal-bg'))document.getElementById('modal').innerHTML=''}
function openExport(){
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

  const scheduleRows=notes.map(n=>({
    상태:isDone(n)?'완료':'진행중',
    구분:typeName(n.type),
    대상:n.who||'공통',
    반복:repeatName(n.repeat||''),
    제목:n.title||'',
    시작일:n.start||'',
    종료일:n.end||'',
    시작시간:n.sT||'',
    종료시간:n.eT||'',
    코멘트:n.comment||''
  }));

  const requestRows=requests.map(r=>({
    상태:isDone(r)?'완료':'진행중',
    작성자:r.writer||'',
    부탁할일:r.title||'',
    메모:r.comment||''
  }));

  const familyRows=[];
  family.forEach(kid=>{
    (kid.cats||[]).forEach(cat=>{
      (cat.items||[]).forEach(item=>{
        familyRows.push({
          이름:kid.name||'',
          학교과정:kid.grade||'',
          학년:kid.year||'',
          반:kid.cls||'',
          번호:kid.num||'',
          구분:cat.label||'',
          요일:daysFmt(item.days),
          내용:item.val||''
        });
      });
    });
  });

  const shiftRows=Object.keys(shiftData).sort().map(k=>({
    날짜:k,
    근무:shiftData[k]||''
  }));

  const memoryRows=memories.map(x=>{
    const nb=nextBirthInfo(x.birth);
    return {
      대상:x.name||'',
      생년월일:x.birth||'',
      만나이:x.birth?ageNow(x.birth):'',
      다음생일:nb.date||'',
      Dday:nb.dday||'',
      메모:x.memo||''
    };
  });

  // SheetJS가 로드되면 진짜 .xlsx 생성
  if(window.XLSX){
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(scheduleRows),'일정');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(requestRows),'조르기');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(familyRows),'아이정보');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(shiftRows),'근무표');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(memoryRows),'기억해');
    XLSX.writeFile(wb,`가족캘린더_${stamp}.xlsx`);
    return;
  }

  // 인터넷 문제로 라이브러리가 안 불러와졌을 때 CSV로 대체
  const rows=[['상태','구분','제목','시작일','종료일','시작시간','종료시간','코멘트'],
    ...scheduleRows.map(r=>[r.상태,r.구분,r.제목,r.시작일,r.종료일,r.시작시간,r.종료시간,r.코멘트])];
  const csv='\ufeff'+rows.map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`가족캘린더_${stamp}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}


function hideSplash(){
  const s=document.getElementById('splash');
  if(s && !s.dataset.hiding){
    s.dataset.hiding='1';
    setTimeout(()=>s.classList.add('hide'),300);
    setTimeout(()=>s.remove(),800);
  }
}

initData();
setTimeout(hideSplash,3000);
window.addEventListener('load', hideSplash);
</script>
</body>
</html>
