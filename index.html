<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F5F7;--card:#fff;--border:#E5E5EA;
  --t1:#1C1C1E;--t2:#6B6B6F;--t3:#AEAEB2;
  --blue:#007AFF;--blue-bg:#EAF3FF;--blue-t:#0055B3;
  --pink:#FF2D55;--pink-bg:#FFF0F3;--pink-t:#C0002C;
  --green:#34C759;--green-bg:#EDFAF2;--green-t:#1A7A36;
  --purple:#7C3AED;--purple-bg:#F2EEFF;--purple-t:#4C1D95;
  --orange:#FF9500;--orange-bg:#FFF4E5;--orange-t:#7A3800;
  --yellow:#FFCC00;--yellow-bg:#FFF8D9;--yellow-t:#7A5A00;
  --r:18px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:15px}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative;overflow:hidden}
.topbar{padding:18px 20px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent}
.app-name{font-size:24px;font-weight:900;color:#007AFF;text-align:center}
.app-sub{font-size:13px;color:#888;margin-top:4px;text-align:center}
.top-right{display:flex;gap:8px;align-items:center}
.toss-btn{height:36px;padding:0 14px;border-radius:22px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:700;color:var(--t1);cursor:pointer;font-family:inherit;white-space:nowrap}
.toss-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.toss-btn.purple{background:var(--purple);border-color:var(--purple);color:#fff}
.tab-bar{display:flex;gap:8px;padding:14px 20px 0}
.tab{flex:1;padding:12px 0;border-radius:24px;border:none;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center}
.tab-s{background:var(--blue-bg);color:var(--blue-t)}
.tab-s.on{background:var(--blue);color:#fff}
.tab-c{background:var(--green-bg);color:var(--green-t)}
.tab-c.on{background:var(--green);color:#fff}
.tab-i{background:var(--purple-bg);color:var(--purple-t)}
.tab-i.on{background:var(--purple);color:#fff}
.tab-r{background:var(--orange-bg);color:var(--orange-t)}
.tab-r.on{background:var(--orange);color:#fff}

.share-banner{margin:14px 16px 0;background:var(--orange-bg);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);gap:10px}
.share-txt{font-size:13px;font-weight:800;color:var(--orange-t)}
.share-sub{font-size:11px;color:var(--orange-t);opacity:.75;margin-top:2px;word-break:break-all}
.share-btn{font-size:12px;font-weight:800;padding:8px 14px;border-radius:20px;background:var(--orange);color:#fff;border:none;cursor:pointer;font-family:inherit;flex-shrink:0}
.sync-pill{margin:8px 16px 0;padding:8px 12px;border-radius:12px;font-size:11px;color:var(--t2);background:var(--card);border:1px solid var(--border)}

.filter-row{display:flex;gap:8px;padding:14px 20px 0;flex-wrap:wrap}
.chip-btn{display:inline-flex;align-items:center;height:34px;padding:0 15px;border-radius:22px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .12s;gap:4px}
.cb-all{background:var(--card);color:var(--t2)}
.cb-all.on{background:var(--t1);color:#fff}
.cb-p{background:var(--pink-bg);color:var(--pink-t)}
.cb-p.on{background:var(--pink);color:#fff}
.cb-w{background:var(--blue-bg);color:var(--blue-t)}
.cb-w.on{background:var(--blue);color:#fff}
.cb-f{background:var(--green-bg);color:var(--green-t)}
.cb-f.on{background:var(--green);color:#fff}

.sec{padding:16px 20px 8px;font-size:12px;font-weight:800;color:var(--t2);letter-spacing:.03em;display:flex;align-items:center;gap:8px}
.sec-cnt{background:var(--card);color:var(--t3);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.card-wrap{padding:0 16px;display:flex;flex-direction:column;gap:9px}
.card{background:var(--card);border-radius:var(--r);padding:15px 16px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.c-row{display:flex;align-items:flex-start;gap:11px}
.chk{width:23px;height:23px;min-width:23px;border:2px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;flex-shrink:0;margin-top:1px}
.chk.on{border-color:#cc0000}
.chk svg{display:none}
.chk.on svg{display:block}
.c-body{flex:1;min-width:0}

.c-title, .ev-title {
  font-size:15px;
  font-weight:700;
  line-height:1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.c-title.done{text-decoration:line-through;color:var(--t3)}
.c-meta{display:flex;align-items:center;gap:5px;margin-top:7px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;height:23px;padding:0 9px;border-radius:20px;font-size:11px;font-weight:800}
.chip-p{background:var(--pink-bg);color:var(--pink-t)}
.chip-w{background:var(--blue-bg);color:var(--blue-t)}
.chip-f{background:var(--green-bg);color:var(--green-t)}
.chip-g{background:var(--bg);color:var(--t2);font-weight:600}
.c-right{display:flex;flex-direction:column;align-items:flex-start;gap:14px;margin-left:4px;min-width:46px}
.small-link{font-size:11px;color:var(--t3);border:none;background:transparent;cursor:pointer;font-family:inherit}
.comment-pill{margin-top:7px;background:var(--blue-bg);color:var(--blue-t);font-size:11px;padding:6px 10px;border-radius:10px;cursor:pointer;border:none;font-family:inherit;text-align:left;font-style:italic;width:100%;display:block}
.div{height:1px;background:var(--border);margin:14px 16px}
.period-row{display:flex;gap:6px;padding:8px 20px 0;align-items:center}
.period-lbl{font-size:12px;color:var(--t2);font-weight:700}
.period-chip{height:28px;padding:0 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-family:inherit}
.period-chip.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-t)}
.empty{text-align:center;padding:34px 20px;color:var(--t3);font-size:13px}

.cal-outer{padding:0 14px;margin-top:14px;display:flex;flex-direction:column;gap:10px}
.cal-card{background:var(--card);border-radius:24px;padding:16px 14px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-title{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.cal-nav-btn{width:42px;height:42px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:22px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%}
.cal-dname{text-align:center;font-size:10px;font-weight:800;color:var(--t3);padding:6px 0;letter-spacing:.04em}

/* 공휴일/주말 색상 클래스 추가 */
.text-red { color: #FF3B30 !important; }
.text-blue { color: #007AFF !important; }

.cal-cell{
  min-height:58px;text-align:center;padding:4px 1px;border-radius:12px;
  cursor:pointer;transition:background .1s;overflow:hidden;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
.cal-cell:hover{background:var(--bg)}
.cal-cell.sel{background:var(--green-bg);outline:2px solid var(--green)}
.cal-num{font-size:12px;color:var(--t2);line-height:1.4;margin:0 auto 4px}
.cal-num.today-n{font-weight:900;color:#fff !important;background:var(--blue);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.shift-one{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;padding:0 5px;border-radius:7px;font-size:10px;font-weight:900;line-height:1}
.s-d{background:#DCFCE7;color:#166534}
.s-e{background:#FEF9C3;color:#854D0E}
.s-n{background:#EDE9FE;color:#4C1D95}
.s-off{background:#F2F2F7;color:#8E8E93;border:1px solid #E5E5EA}
.cal-dots{display:flex;gap:3px;justify-content:center;min-height:6px;margin-top:4px;flex-wrap:wrap}
.cal-dot{width:5px;height:5px;border-radius:50%}
.dp{background:var(--pink)}
.dw{background:var(--blue)}
.df{background:var(--green)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;padding:12px 0 0;border-top:1px solid var(--bg);margin-top:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.leg-chip{font-size:10px;font-weight:900;padding:4px 7px;border-radius:6px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ev-card{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.ev-hd{font-size:14px;font-weight:900;color:var(--t1);margin-bottom:10px}
.shift-picker{display:flex;align-items:center;gap:8px;margin:0 0 12px;padding:10px;border-radius:14px;background:var(--bg)}
.shift-picker-title{font-size:12px;font-weight:900;color:var(--t2);margin-right:2px}
.shift-btn{height:32px;min-width:44px;border:none;border-radius:12px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit}
.shift-btn.on{outline:3px solid rgba(0,122,255,.25)}
.ev-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg);align-items:flex-start}
.ev-item:last-child{border-bottom:none}
.ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-sub{font-size:11px;color:var(--t3);margin-top:2px}

.fi-outer{padding:0 16px;margin-top:14px;display:flex;flex-direction:column;gap:10px}
.fi-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.fi-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fi-name{font-size:16px;font-weight:900}
.fi-hd-btns{display:flex;gap:6px}
.fi-btn{font-size:11px;font-weight:800;padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-family:inherit}
.fi-btn-e{background:var(--blue-bg);color:var(--blue)}
.fi-btn-d{background:var(--pink-bg);color:var(--pink)}
.fi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg)}
.fi-row:last-child{border-bottom:none}
.fi-key{font-size:12px;color:var(--t2);flex-shrink:0;min-width:76px}
.fi-input{font-size:13px;font-weight:700;color:var(--t1);text-align:right;border:none;background:transparent;font-family:inherit;width:100%;outline:none;max-width:220px}
.fi-input:focus{background:var(--bg);border-radius:8px;padding:4px 7px}
.cat-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 0 5px;border-top:1px solid var(--bg);margin-top:4px}
.cat-lbl{font-size:11px;font-weight:900;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.cat-hd-r{display:flex;gap:5px}
.cat-add{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;background:var(--blue-bg);color:var(--blue);border:none;cursor:pointer;font-family:inherit}
.cat-del{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;background:var(--pink-bg);color:var(--pink);border:none;cursor:pointer;font-family:inherit}
.row-del{font-size:11px;color:var(--t3);border:none;background:transparent;cursor:pointer;font-family:inherit;padding:0 2px;flex-shrink:0}
.day-sel{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.day-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .12s}
.day-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:100}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px 32px;width:100%;max-height:90vh;overflow-y:auto}
.modal-ind{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-hd{font-size:17px;font-weight:900;margin-bottom:14px}
.ml{font-size:11px;font-weight:900;color:var(--blue);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.06em}
.ml:first-of-type{margin-top:0}
.mi{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.mi:focus{border-color:var(--blue);background:transparent}
.mi-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mi-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-sel{display:flex;gap:8px}
.type-btn{flex:1;padding:11px 4px;border-radius:12px;border:1.5px solid var(--border);background:transparent;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .12s}
.type-btn.tp{background:var(--pink-bg);color:var(--pink-t);border-color:var(--pink)}
.type-btn.tw{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue)}
.type-btn.tf{background:var(--green-bg);color:var(--green-t);border-color:var(--green)}
.primary-btn{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:16px}
.cancel-link{width:100%;padding:10px;border:none;background:transparent;color:var(--t3);font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px}
.ta{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--t1);font-size:13px;font-family:inherit;outline:none;resize:none;min-height:72px}
.ta:focus{border-color:var(--blue);background:transparent}
.sublabel{font-size:10px;color:var(--t3);margin-bottom:4px}

.splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(180deg,#FFFDF8 0%,#F5F5F7 100%);display:flex;align-items:center;justify-content:center;transition:opacity .45s ease, visibility .45s ease;}
.splash.hide{opacity:0;visibility:hidden}
.splash-box{display:flex;flex-direction:column;align-items:center;gap:14px;transform:translateY(-10px);animation:splashPop .65s ease both;}
.splash-icon{width:92px;height:92px;border-radius:24px;box-shadow:0 14px 32px rgba(0,0,0,.14);object-fit:cover;background:#fff;}
.splash-title{font-size:24px;font-weight:900;color:var(--blue);letter-spacing:-.5px}
.splash-sub{font-size:13px;font-weight:700;color:var(--t3)}
.splash-loader{margin-top:4px;width:36px;height:4px;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--orange));animation:splashLoad 1s ease-in-out infinite alternate;}

.picker-field{width:100%;height:48px;padding:0 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--t1);font-size:13px;font-family:inherit;font-weight:800;text-align:center;outline:none;cursor:pointer;letter-spacing:-.4px;}
.picker-field.empty{color:var(--t3);font-weight:700}
.picker-bg{position:fixed;inset:0;z-index:220;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;}
.picker-sheet{width:100%;background:var(--card);border-radius:24px 24px 0 0;padding:18px 20px 26px;box-shadow:0 -8px 28px rgba(0,0,0,.12);}
.picker-title{font-size:17px;font-weight:900;margin-bottom:14px;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.picker-grid.time{grid-template-columns:1fr 1fr;}
.picker-select{width:100%;height:46px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);font-size:15px;font-weight:800;text-align:center;color:var(--t1);font-family:inherit;padding:0 8px;}
.picker-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.picker-actions button{height:46px;border-radius:16px;border:none;font-size:14px;font-weight:900;font-family:inherit;}
.picker-cancel{background:var(--bg);color:var(--t2)}
.picker-save{background:var(--blue);color:#fff}

.person-chip{display:inline-flex;align-items:center;height:23px;padding:0 9px;border-radius:20px;font-size:11px;font-weight:900}
.person-common{background:#F2F2F7;color:#6B6B6F}
.person-dad{background:#EAF3FF;color:#0055B3}
.person-mom{background:#FFF0F3;color:#C0002C}
.person-choi{background:#EDFAF2;color:#1A7A36}
.person-domi{background:#F2EEFF;color:#4C1D95}

.widget-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 0}
.widget-card{background:var(--card);border-radius:18px;padding:13px 14px;box-shadow:0 1px 5px rgba(0,0,0,.07);min-height:76px}
.widget-title{font-size:11px;font-weight:900;color:var(--t3);margin-bottom:6px}
.widget-main{font-size:17px;font-weight:900;color:var(--t1);letter-spacing:-.4px}
.widget-sub{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.35}

.search-wrap{padding:12px 16px 0}
.search-input{width:100%;height:42px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);color:var(--t1);padding:0 14px;font-size:14px;font-weight:700;font-family:inherit;outline:none;box-shadow:0 1px 5px rgba(0,0,0,.06);}
.search-line{display:flex;gap:8px}
.search-apply{width:58px;border-radius:16px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:900;font-family:inherit;}

.tab{background:var(--card) !important;border:1.5px solid var(--border) !important;color:var(--t1) !important}
.tab.on{background:var(--blue) !important;color:#fff !important;border-color:var(--blue) !important}

body{background:linear-gradient(180deg,#F7F8FA 0%,#F2F3F6 100%) !important;}

// [신규] 대한민국 2024~2027 대체공휴일 및 선거일 포함 데이터

  '2024-01-01','2024-02-09','2024-02-10','2024-02-11','2024-02-12','2024-03-01','2024-04-10','2024-05-05','2024-05-06','2024-05-15','2024-06-06','2024-08-15','2024-09-16','2024-09-17','2024-09-18','2024-10-01','2024-10-03','2024-10-09','2024-12-25',
  '2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-03-01','2025-03-03','2025-05-05','2025-05-06','2025-06-06','2025-08-15','2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-08','2025-10-09','2025-12-25',
  '2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-03-02','2026-05-05','2026-05-24','2026-05-25','2026-06-03','2026-06-06','2026-08-15','2026-08-17','2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-05','2026-10-09','2026-12-25',
  '2027-01-01','2027-02-06','2027-02-07','2027-02-08','2027-02-09','2027-03-01','2027-03-03','2027-05-05','2027-05-13','2027-06-06','2027-08-15','2027-08-16','2027-09-14','2027-09-15','2027-09-16','2027-10-03','2027-10-04','2027-10-09','2027-10-11','2027-12-25','2027-12-27'
];

const SK={data:'fam_shared_v8_data',room:'fam_shared_v8_room'};
const DEFAULT_DATA={
  notes:[
    {id:1,title:'첫째 태권도',type:'family',start:'2026-05-04',end:'',sT:'17:00',eT:'18:00',done:false,comment:''}
  ],
  requests:[],

  memories:[],
  family:[],
  shiftData:{},
  deletedItems:[]
};

const TODAY=new Date();
const TY=TODAY.getFullYear(),TM=TODAY.getMonth(),TD=TODAY.getDate();
let main='s',subF='all',doneF='all',donePer='1m',searchQ='',searchDraft='',isComposing=false,calWhoF='all';
let weekOpen=false;
let filterToday=false;
let calY=TY,calM=TM,selDate=null;
let _mType='family', _mWho='공통';
const DAYS=['일','월','화','수','목','금','토'];
const SHIFTS=['D','E','N','OFF'];
const SCLS={D:'s-d',E:'s-e',N:'s-n',OFF:'s-off'};

const BASE_PERSONS = ['공통','아빠','엄마','초이','도미'];
function personCls(who){
  if(who==='아빠')return 'person-dad';
  if(who==='엄마')return 'person-mom';
  if(who==='초이')return 'person-choi';
  if(who==='도미')return 'person-domi';
  const arr=getPersons();
  const idx=Math.max(0,arr.indexOf(who));
  return ['person-common','person-dad','person-mom','person-choi','person-domi'][idx%5];
}
function repeatName(r){return r==='daily'?'매일':r==='weekly'?'매주':r==='monthly'?'매월':'반복 없음'}
function getPersons(){
  const names = [...BASE_PERSONS];
  (family||[]).forEach(k=>{
    const n=(k.name||'').trim();
    if(n && !names.includes(n)) names.push(n);
  });
  return names;
}

const STXT={D:'주간',E:'저녁',N:'야간',OFF:'휴무'};

let notes=[],family=[],requests=[],memories=[],notices=[],deletedItems=[],shiftData={};

function makeId(){
  return Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
}

function getRoomId() {
  const url = new URL(location.href);
  
  let r = url.searchParams.get('room') 
       || localStorage.getItem(SK.room) 
       || 'family-' + makeId(); 

  if (!url.searchParams.get('room')) {
    url.searchParams.set('room', r);
    history.replaceState(null, '', url.toString());
  }

  localStorage.setItem(SK.room, r);
  return r;
}

let roomId = getRoomId();
let unsubscribe=null;
let remoteReady=false;
let savingRemote=false;
let hydrated=false;

function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtD(s){if(!s)return'';const p=s.split('-');return`${+p[1]}/${+p[2]}`}
function dateTimeRange(n){
  const start=n.start||'';
  const end=n.end||'';
  const sT=n.sT||'';
  const eT=n.eT||'';

  if(!sT && !eT){
    if(!start)return '';
    if(!end || end===start)return fmtD(start);
    return `${fmtD(start)} ~ ${fmtD(end)}`;
  }

  const st=[fmtD(start),sT].filter(Boolean).join(' ');
  const ed=[fmtD(end||start),eT].filter(Boolean).join(' ');
  if(st&&ed)return `${st} ~ ${ed}`;
  return st||ed||'';
}
function daysFmt(arr){if(!arr||!arr.length)return'매일';return arr.map(i=>DAYS[i]).join('·')}
function typeName(t){return t==='work'?'회사':t==='family'?'가족':'개인'}
function typeChip(t){return t==='work'?'chip-w':t==='family'?'chip-f':'chip-p'}
function dotCls(t){return t==='work'?'dw':t==='family'?'df':'dp'}
function getShiftCount(y,m){
  const counts={D:0,E:0,N:0,OFF:0};
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const s=shiftData[dk(y,m,d)];
    if(counts[s]!==undefined)counts[s]++;
  }
  return counts;
}
function isDone(x){return x.done===true || x.done==='true' || x.done===1 || x.done==='1'}
function birthDateInYear(birth,year){
  if(!birth)return '';
  const [,mm,dd]=birth.split('-').map(Number);
  const last=new Date(year,mm,0).getDate();
  const d=Math.min(dd,last);
  return `${year}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function memoriesOnDate(y,m,d){
  const md=`${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return memories.filter(x=>x.birth&&x.birth.slice(5)===md);
}
function ageNow(birth){
  if(!birth)return '';
  const [by]=birth.split('-').map(Number);
  const thisBirth=birthDateInYear(birth,TY);
  let age=TY-by;
  if(dk(TY,TM,TD)<thisBirth)age--;
  return Math.max(0,age);
}
function nextBirthInfo(birth){
  if(!birth)return {date:'',dday:''};
  let y=TY;
  let b=birthDateInYear(birth,y);
  const today=dk(TY,TM,TD);
  if(b<today){y++;b=birthDateInYear(birth,y);}
  const diff=Math.ceil((new Date(b+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
  return {date:b,dday:diff===0?'D-Day':`D-${diff}`};
}

function todayKey(){return dk(TY,TM,TD)}
function tomorrowKey(){return addDaysStr(todayKey(),1)}

function addDaysStr(dateStr,days){
  const [y,m,d]=dateStr.split('-').map(Number);
  const nd=new Date(y,m-1,d+days);
  return dk(nd.getFullYear(),nd.getMonth(),nd.getDate());
}
function occursOn(n,key){
  if(!n.start) return false;
  if(n.repeatEnd && key>n.repeatEnd) return false;
  if(Array.isArray(n.skipDates) && n.skipDates.includes(key)) return false;
  if(!n.repeat){
    if(!n.sT && !n.eT && (!n.end || n.end===n.start)) return n.start===key;
    return n.start<=key && (!n.end || n.end>=key);
  }
  if(key<n.start) return false;
  const start=new Date(n.start+'T00:00:00');
  const cur=new Date(key+'T00:00:00');
  const diff=Math.round((cur-start)/86400000);
  if(n.repeat==='daily') return diff>=0;
  if(n.repeat==='weekly') return diff>=0 && diff%7===0;
  if(n.repeat==='monthly') return n.start.slice(8,10)===key.slice(8,10);
  return false;
}
function notesOnDateAll(y,m,d){
  const k=dk(y,m,d);
  return notes.filter(n=>!isDone(n)&&occursOn(n,k)).map(n=>{
    if(n.repeat) return {...n,start:k,end:k,_repeatInstance:true};
    return n;
  });
}

function normalizeData(d){
  const base=deepCopy(DEFAULT_DATA);
  d=d||base;
  notes=Array.isArray(d.notes)?d.notes:base.notes;
  notes.forEach(n=>{if(!n.who)n.who='공통'; if(!('repeat' in n))n.repeat=''; if(!Array.isArray(n.skipDates))n.skipDates=[]; if(!n.alertMemo)n.alertMemo='';});
  requests=Array.isArray(d.requests)?d.requests:(base.requests||[]);
  memories=Array.isArray(d.memories)?d.memories:(base.memories||[]);
  notices=Array.isArray(d.notices)?d.notices:(base.notices||[]);
  deletedItems=Array.isArray(d.deletedItems)?d.deletedItems:(base.deletedItems||[]);
  family=Array.isArray(d.family)?d.family:base.family;
  notices.forEach(n=>{if(!('important' in n))n.important=false; if(!('read' in n))n.read=false;});
  purgeOldTrash(false);
  shiftData=d.shiftData||{};
}
function currentData(){return {notes,family,requests,memories,notices,deletedItems,shiftData,updatedAt:Date.now()}}
function saveLocal(){localStorage.setItem(SK.data,JSON.stringify(currentData()))}
function loadLocal(){try{return JSON.parse(localStorage.getItem(SK.data)||'null')}catch(e){return null}}

function saveShiftOnly(k,t){
  saveLocal();
  if(remoteReady && window.__firebaseAPI && hydrated){
    savingRemote=true;
    const api=window.__firebaseAPI;
    const ref=api.doc(api.db,'familyCalendars',roomId);
    const finish=()=>{savingRemote=false};
    if(k && api.updateDoc && api.FieldPath){
      api.updateDoc(ref, new api.FieldPath('shiftData', k), t, 'updatedAt', api.serverTimestamp())
        .catch(e=>{
          console.warn(e);
          return api.setDoc(ref,{shiftData,updatedAt:api.serverTimestamp()},{merge:true});
        })
        .catch(e=>{console.warn(e);updateSyncPill('근무표 저장 실패: 로컬에만 저장됨');})
        .finally(finish);
    }else{
      api.setDoc(ref,{shiftData,updatedAt:api.serverTimestamp()},{merge:true})
        .catch(e=>{console.warn(e);updateSyncPill('근무표 저장 실패: 로컬에만 저장됨');})
        .finally(finish);
    }
  }
}
function saveAll(){
  saveLocal();
  if(remoteReady && window.__firebaseAPI && hydrated){
    savingRemote=true;
    const api=window.__firebaseAPI;
    api.setDoc(api.doc(api.db,'familyCalendars',roomId), {...currentData(), updatedAt:api.serverTimestamp()}, {merge:true})
      .catch(e=>{console.warn(e);updateSyncPill('Firebase 저장 실패: 로컬에만 저장됨');})
      .finally(()=>{savingRemote=false;});
  }
}

async function initData(){
  try{
    normalizeData(loadLocal()||DEFAULT_DATA);
    hydrated=true;
    render();

    await Promise.race([
      waitFirebase(),
      new Promise(resolve=>setTimeout(resolve,800))
    ]);

    if(window.__firebaseReady && window.__firebaseAPI){
      remoteReady=true;
      updateSyncPill('실시간 공유 연결 중...');
      const api=window.__firebaseAPI;
      const ref=api.doc(api.db,'familyCalendars',roomId);

      let snap=null;
      try{
        snap=await Promise.race([
          api.getDoc(ref),
          new Promise((_,reject)=>setTimeout(()=>reject(new Error('Firebase 읽기 시간 초과')),3000))
        ]);
      }catch(e){
        console.warn(e);
        updateSyncPill('Firebase 응답 지연 · 로컬 데이터로 먼저 실행 중');
        return;
      }

      if(!snap.exists()){
        await api.setDoc(ref,{...currentData(),createdAt:api.serverTimestamp(),updatedAt:api.serverTimestamp()});
      }else{
        normalizeData(snap.data());
        saveLocal();
        render();
      }

      unsubscribe=api.onSnapshot(ref,(s)=>{
        if(!s.exists()||savingRemote)return;
        normalizeData(s.data());
        saveLocal();
        render();
        updateSyncPill('실시간 공유 연결됨');
      },(e)=>{
        console.warn(e);
        updateSyncPill('공유 연결 실패 · 로컬 저장으로 동작 중');
      });
    }else{
      updateSyncPill('현재 로컬 저장 모드 · Firebase 설정 필요');
    }
  }catch(e){
    console.warn('앱 초기화 오류',e);
    hydrated=true;
    normalizeData(loadLocal()||DEFAULT_DATA);
    render();
    updateSyncPill('초기화 오류 · 로컬 저장으로 동작 중');
  }finally{
    hideSplash();
  }
}
function waitFirebase(){return new Promise(resolve=>setTimeout(resolve,300));}

function updateSyncPill(txt){

function doneAfter(){
  const n=new Date();
  if(donePer==='all')return new Date(0);
  const d=new Date(n);
  if(donePer==='1w')d.setDate(d.getDate()-7);
  else if(donePer==='2w')d.setDate(d.getDate()-14);
  else if(donePer==='1m')d.setMonth(d.getMonth()-1);
  else if(donePer==='3m')d.setMonth(d.getMonth()-3);
  return d;
}

function skipRepeatInstance(id,dateKey){
  if(!requireEditMode())return;

  if(!confirm('이번 회차만 삭제할까요?'))return;

function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escapeAttr(s){return String(s??'').replace(/"/g,'&quot;');}

function highlightText(s){
  const safe=escapeHtml(s||'');
  const q=String(searchQ||'').trim();
  if(!q)return safe;
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(esc,'gi'),m=>`<mark class="hl">${m}</mark>`);
}

let dragInfo=null;

function dragStart(e, listName, id){
  dragInfo={listName,id};
  e.currentTarget.classList.add('dragging');
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain', id);
  }
}
function dragOver(e){
  e.preventDefault();
  if(e.currentTarget)e.currentTarget.classList.add('drop-target');
  if(e.dataTransfer)e.dataTransfer.dropEffect='move';
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drop-target').forEach(x=>x.classList.remove('drop-target'));
  dragInfo=null;
}
function dropItem(e, listName, targetId){
  e.preventDefault();
  if(e.currentTarget)e.currentTarget.classList.remove('drop-target');
  if(!dragInfo || dragInfo.listName!==listName || String(dragInfo.id)===String(targetId)) return;

  const arr = listName==='notes' ? notes : requests;
  const from = arr.findIndex(x=>String(x.id)===String(dragInfo.id));
  const to = arr.findIndex(x=>String(x.id)===String(targetId));
  if(from<0 || to<0) return;

  const [item] = arr.splice(from,1);
  arr.splice(to,0,item);

  saveAll();
  render();
}

  else if(x.kind==='request')requests.push(x.item);
  else if(x.kind==='memory')memories.push(x.item);
  else if(x.kind==='kid')family.push(x.item);
  deletedItems.splice(idx,1);
  saveAll();openTrash();render();

function repairData(){
  if(!requireEditMode())return;
  const validTypes=['family','personal','work'];
  const validRepeats=['','daily','weekly','monthly'];
  const validShifts=['','D','E','N','OFF'];
  const isDate=v=>!v || /^\d{4}-\d{2}-\d{2}$/.test(v);
  const seen=new Set();
  let fixed=0;

  notes=Array.isArray(notes)?notes:[];
  requests=Array.isArray(requests)?requests:[];
  memories=Array.isArray(memories)?memories:[];
  notices=Array.isArray(notices)?notices:[];
  family=Array.isArray(family)?family:[];
  deletedItems=Array.isArray(deletedItems)?deletedItems:[];
  shiftData=shiftData&&typeof shiftData==='object'?shiftData:{};

  notes.forEach(n=>{
    if(!n.id || seen.has('n'+n.id)){n.id=Date.now()+Math.random();fixed++}
    seen.add('n'+n.id);
    if(!n.title){n.title='제목 없는 일정';fixed++}
    if(!n.who){n.who='공통';fixed++}
    if(!validTypes.includes(n.type)){n.type='family';fixed++}
    if(!validRepeats.includes(n.repeat)){n.repeat='';fixed++}
    if(!Array.isArray(n.skipDates)){n.skipDates=[];fixed++}
    n.skipDates=n.skipDates.filter(isDate);
    if(!isDate(n.start)){n.start='';fixed++}
    if(!isDate(n.end)){n.end='';fixed++}
    if(!isDate(n.repeatEnd)){n.repeatEnd='';fixed++}
    if(!n.alertMemo)n.alertMemo='';
    if(!('done' in n))n.done=false;
  });

  requests.forEach(r=>{
    if(!r.id || seen.has('r'+r.id)){r.id=Date.now()+Math.random();fixed++}
    seen.add('r'+r.id);
    if(!r.title){r.title='제목 없는 부탁';fixed++}
    if(!('done' in r))r.done=false;
  });

  memories.forEach(m=>{
    if(!m.id || seen.has('m'+m.id)){m.id=Date.now()+Math.random();fixed++}
    seen.add('m'+m.id);
    if(!m.name){m.name='이름 없음';fixed++}
    if(!isDate(m.birth)){m.birth='';fixed++}
  });

  notices.forEach(n=>{
    if(!n.id || seen.has('nt'+n.id)){n.id=Date.now()+Math.random();fixed++}
    seen.add('nt'+n.id);
    if(!n.title){n.title='가족 공지';fixed++}
    if(!('read' in n))n.read=false;
    if(!('important' in n))n.important=false;
    if(!n.createdAt)n.createdAt=Date.now();
  });

  Object.keys(shiftData).forEach(k=>{
    if(!isDate(k) || !validShifts.includes(shiftData[k])){delete shiftData[k];fixed++}
  });

  purgeOldTrash(false);
  saveAll();render();
  alert(`데이터 점검 완료${fixed?` · 보정 ${fixed}건`:''}`);
}

  const todayList=notes.filter(n=>!isDone(n)&&occursOn(n,todayKey()));
  const reqCnt=requests.filter(r=>!isDone(r)).length;
  return `<div class="widget-wrap">
    <div class="widget-card" data-action="today" onclick="onWidgetClick(this)">
      <div class="widget-title">오늘은?</div>
      <div class="widget-main">${todayList.length}개</div>
      <div class="widget-sub">${todayList.slice(0,2).map(n=>escapeHtml(n.title)).join('<br>')||'오늘 일정 없음'}</div>
      <div class="quick-actions">
        <button onclick="event.stopPropagation();openAddModal(todayKey())">오늘 추가</button>
        <button onclick="event.stopPropagation();openAddModal(tomorrowKey())">내일 추가</button>
      </div>
    </div>
    <div class="widget-card" data-action="request" onclick="onWidgetClick(this)">
      <div class="widget-title">부탁</div>
      <div class="widget-main">${reqCnt}개</div>
      <div class="widget-sub">${reqCnt?'진행 중 부탁 있음':'부탁할 일 없음'}</div>
    </div>
  </div>`;
}

function renderManualNotice(){
  const list=(notices||[]).filter(n=>n.important||!n.read).sort((a,b)=>{
    if(!!b.important!==!!a.important)return b.important?1:-1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
  if(!list.length)return '';
  const n=list[0];
  return `<div class="notice-manual${n.important?' important':''}" onclick="openNoticeList()" style="cursor:pointer">
    <div class="nt-title">${n.important?'⭐':'📌'} ${escapeHtml(n.title||'가족 공지')}</div>
    <div class="nt-body">${escapeHtml(n.body||'')}</div>
    ${list.length>1?`<div class="nt-body" style="margin-top:4px">외 ${list.length-1}개 공지</div>`:''}
  </div>`;
}

function openNoticeList(){
  const list=[...(notices||[])].sort((a,b)=>{
    if(!!b.important!==!!a.important)return b.important?1:-1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">가족 공지</div>
      ${list.length?list.map(n=>`<div class="card" style="margin-bottom:8px">
        <div class="c-title">${n.important?'⭐ ':''}${escapeHtml(n.title||'가족 공지')}</div>
        <div class="c-meta"><span class="chip chip-g">${n.read?'읽음':'새 공지'}</span>${n.important?`<span class="chip imp-chip">중요</span>`:''}</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.45;margin-top:8px">${escapeHtml(n.body||'')}</div>
        <div class="action-grid">
          <button class="toss-btn" onclick="markNoticeRead('${n.id}')">읽음</button>
          <button class="toss-btn primary" onclick="openNoticeModal('${n.id}')">수정</button>
        </div>
      </div>`).join(''):'<div class="empty">등록된 공지가 없어요</div>'}
      <button class="primary-btn" onclick="openNoticeModal()">+ 공지 추가</button>
      <button class="cancel-link" onclick="closeM()">닫기</button>
    </div>
  </div>`;
}

function markNoticeRead(id){
  if(!requireEditMode())return;

  const n=(notices||[]).find(x=>String(x.id)===String(id));
  if(n){n.read=true;saveAll();render();}
}

function openNoticeModal(id){
  const n=id?(notices||[]).find(x=>String(x.id)===String(id)):null;
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">${n?'공지 수정':'공지 추가'}</div>
      <div class="ml">제목</div>
      <input class="mi" id="nt-title" placeholder="예: 이번 주 금요일 조기하교" value="${n?escapeAttr(n.title):''}"/>
      <div class="ml">내용</div>
      <textarea class="ta" id="nt-body" placeholder="가족에게 공유할 내용을 적어주세요">${n?escapeHtml(n.body||''):''}</textarea>
      <div class="ml">중요 공지</div>
      <button class="type-btn${n&&n.important?' tf':''}" id="nt-important" data-val="${n&&n.important?'1':''}" onclick="this.dataset.val=this.dataset.val?'':'1';this.className='type-btn'+(this.dataset.val?' tf':'')">중요로 고정</button>
      <button class="primary-btn" onclick="saveNotice('${n?n.id:''}')">저장</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}

function saveNotice(id){
  if(!requireEditMode())return;

  const title=(document.getElementById('nt-title')||{}).value||'';
  const body=(document.getElementById('nt-body')||{}).value||'';
  const important=!!((document.getElementById('nt-important')||{}).dataset||{}).val;
  if(!title.trim())return;
  if(id){
    const n=(notices||[]).find(x=>String(x.id)===String(id)); if(!n)return;
    n.title=title.trim(); n.body=body; n.important=important; n.read=false;
  }else{
    notices.unshift({id:Date.now(),title:title.trim(),body,important,read:false,createdAt:Date.now()});
  }
  saveAll();closeM();render();
}

function monthlyStats(){
  const y=calY,m=calM;
  const first=dk(y,m,1), last=dk(y,m,new Date(y,m+1,0).getDate());
  const monthNotes=notes.filter(n=>n.start && n.start>=first && n.start<=last);
  const done=monthNotes.filter(n=>isDone(n)).length;
  const doneRate=monthNotes.length?Math.round(done/monthNotes.length*100):0;
  const reqTotal=requests.length;
  const reqDone=requests.filter(r=>isDone(r)).length;
  const reqRate=reqTotal?Math.round(reqDone/reqTotal*100):0;
  const shiftCount=getShiftCount(y,m);
  return {total:monthNotes.length,done,doneRate,reqTotal,reqDone,reqRate,shiftCount};
}

function renderStatsCard(){
  const s=monthlyStats();
  return `<div class="stat-grid">
    <div class="stat-card"><div class="stat-k">이번 달 완료</div><div class="stat-v">${s.done}/${s.total}</div></div>
    <div class="stat-card"><div class="stat-k">일정 완료율</div><div class="stat-v">${s.doneRate}%</div></div>
    <div class="stat-card"><div class="stat-k">부탁 처리율</div><div class="stat-v">${s.reqRate}%</div></div>
    <div class="stat-card"><div class="stat-k">근무 분포</div><div class="stat-v" style="font-size:14px;line-height:1.7">D ${s.shiftCount.D} · E ${s.shiftCount.E}<br>N ${s.shiftCount.N} · OFF ${s.shiftCount.OFF}</div></div>
  </div>`;
}

function openDetailNote(id){
  const n=notes.find(x=>String(x.id)===String(id)); if(!n)return;
  const dts=dateTimeRange(n)||'날짜 없음';
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">${escapeHtml(n.title)}</div>
      <div class="detail-row"><span class="detail-key">구분</span><span class="detail-val">${typeName(n.type)}</span></div>
      <div class="detail-row"><span class="detail-key">대상</span><span class="detail-val">${escapeHtml(n.who||'공통')}</span></div>
      <div class="detail-row"><span class="detail-key">일시</span><span class="detail-val">${dts}</span></div>
      <div class="detail-row"><span class="detail-key">반복</span><span class="detail-val">${repeatName(n.repeat||'')}</span></div>
      ${n.repeatEnd?`<div class="detail-row"><span class="detail-key">반복 종료</span><span class="detail-val">${dateLabel(n.repeatEnd)}</span></div>`:''}
      ${n.repeat?`<div class="detail-row"><span class="detail-key">반복 예외</span><span class="detail-val">${(n.skipDates||[]).length}개</span></div>`:''}
      ${n.alertMemo?`<div class="detail-row"><span class="detail-key">알림 메모</span><span class="detail-val">${escapeHtml(n.alertMemo)}</span></div>`:''}
      ${n.comment?`<div class="detail-row"><span class="detail-key">메모</span><span class="detail-val">${escapeHtml(n.comment)}</span></div>`:''}
      <div class="action-grid">
        <button class="toss-btn primary" onclick="openEditNote('${n.id}')">수정</button>
        <button class="toss-btn" onclick="copyNote('${n.id}')">복사</button>
        ${n.repeat?`<button class="toss-btn" onclick="openRepeatExceptions('${n.id}')">예외 보기</button>`:''}
        <button class="toss-btn" onclick="closeM()">닫기</button>
      </div>
    </div>
  </div>`;
}

function downloadBackup(){
  const data=currentData();
  data.backupAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`패스_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function openRestore(){
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">백업 복구</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.5">백업 JSON 파일을 선택하면 현재 데이터가 백업 내용으로 교체됩니다.</div>
      <div class="ml">백업 파일</div>
      <input class="mi" type="file" id="restore-file" accept="application/json,.json"/>
      <button class="primary-btn" onclick="restoreBackup()">복구하기</button>
      <button class="cancel-link" onclick="closeM()">취소</button>
    </div>
  </div>`;
}

function restoreBackup(){
  if(!requireEditMode())return;

  const f=document.getElementById('restore-file')?.files?.[0];
  if(!f)return alert('파일을 선택해 주세요.');
  if(!confirm('현재 데이터를 백업 파일 내용으로 교체할까요?'))return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      normalizeData(d);
      saveAll();
      closeM();
      render();
      alert('복구 완료');
    }catch(e){
      alert('백업 파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(f);
}

function openShareTools(){
  const url=`${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeM(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-ind"></div>
      <div class="modal-hd">공유하기</div>
      <div class="share-banner" style="margin:0">
        <div><div class="share-txt">📎 가족 공유 링크</div><div class="share-sub">${url}</div></div>
        <button class="share-btn" onclick="copyShareLink()">복사</button>
      </div>
      <div class="qr-box"><canvas id="qr-canvas"></canvas></div>
      <div class="action-grid">
        <button class="toss-btn primary" onclick="shareNative()">공유</button>
        <button class="toss-btn" onclick="closeM()">닫기</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{
    if(window.QRCode){
      QRCode.toCanvas(document.getElementById('qr-canvas'),url,{width:180,margin:1});
    }
  },50);
}

function shareNative(){
  const url=`${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
  if(navigator.share){
    navigator.share({title:'가족 캘린더 - 패스',text:'가족 일정 공유 링크',url});
  }else{
    copyShareLink();
  }
}

function render(){
  let h='';
  if(main==='s')h=renderS();
  else if(main==='c')h=renderC();
  else if(main==='i')h=renderI();
  else if(main==='r')h=renderR();
  else if(main==='m')h=renderM();
  document.getElementById('body').innerHTML=renderManualNotice()+renderNoticeBanner()+renderShiftWidget()+renderHomeWidgets()+renderSearchBox()+h;
}

function copyShareLink(){
  const url=`${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert('가족 공유 링크가 복사됐어요.'));}
  else{alert('주소창의 URL을 복사해서 가족에게 보내주세요:\n'+url);}
}

function hideSplash(){
  const s=document.getElementById('splash');
  if(s && !s.dataset.hiding){
    s.dataset.hiding='1';
    setTimeout(()=>s.classList.add('hide'),300);
    setTimeout(()=>s.remove(),800);
  }
}

initData();
setTimeout(hideSplash,3000);
window.addEventListener('load', hideSplash);

// PWA Service Worker (Network-First 대응)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('Service Worker Registered!', reg);
    }).catch(err => {
      console.log('Service Worker registration failed:', err);
    });
  });
}
</script>
